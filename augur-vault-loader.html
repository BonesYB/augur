<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Augur — Vault Loader</title>
<style>
  :root{
    --bg:#14161a; --panel:#1b1e24; --panel-2:#21252c; --line:#2c313a;
    --ink:#e7ebf0; --ink-dim:#9aa3af; --ink-faint:#5f6873;
    --accent:#5b9dff; --scene:#3d6fd6; --seq-tight:#7c5cff; --seq-dist:#1f9e8f;
    --clock:#e0a13c; --npc:#3fbf7f; --location:#46b3c9; --handout:#d65c7a; --creature:#d8553f;
    --good:#3fbf7f; --warn:#e0a13c; --err:#e5604d;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{background:var(--bg); color:var(--ink); font:13px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; overflow:hidden}
  .app{display:grid; grid-template-rows:auto 1fr; height:100vh}

  .top{display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid var(--line); background:var(--panel)}
  .brand{font-weight:700; font-size:15px} .brand .dot{color:var(--accent)}
  .top .sub{color:var(--ink-faint); font-size:11px}
  .top .spacer{margin-left:auto}
  .btn{background:var(--accent); color:#0b0e12; border:0; border-radius:6px; padding:7px 13px; font-size:12px; font-weight:600; cursor:pointer}
  .btn.ghost{background:var(--panel-2); color:var(--ink-dim); border:1px solid var(--line)}
  .btn:hover{filter:brightness(1.08)}
  input[type=file]{display:none}
  .summary{font-size:11px; color:var(--ink-dim)}
  .summary b{color:var(--ink)}
  .pill-err{color:var(--err)} .pill-warn{color:var(--warn)} .pill-ok{color:var(--good)}

  .body{display:grid; grid-template-columns:300px 1fr; min-height:0}
  .bag{background:var(--panel); border-right:1px solid var(--line); overflow-y:auto; padding:8px}
  .empty{height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; text-align:center; color:var(--ink-faint); padding:30px}
  .empty .big{font-size:34px}
  .bag-group h3{font-size:10.5px; text-transform:uppercase; letter-spacing:.7px; color:var(--ink-faint); margin:12px 6px 4px; font-weight:700}
  .bag-item{display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:6px; cursor:pointer; border:1px solid transparent}
  .bag-item:hover{background:var(--panel-2)}
  .bag-item.sel{background:var(--panel-2); border-color:var(--accent)}
  .swatch{width:8px; height:24px; border-radius:3px; flex:none}
  .bag-item .nm{font-size:12.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .bag-item .sb{font-size:10px; color:var(--ink-faint)}

  .detail{overflow-y:auto; padding:20px 26px; min-width:0}
  .d-type{font-size:10.5px; text-transform:uppercase; letter-spacing:.8px; color:var(--ink-faint)}
  .d-title{font-size:24px; font-weight:700; margin:2px 0 10px}
  .row{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px}
  .chip{font-size:11px; padding:2px 9px; border-radius:20px; border:1px solid var(--line); color:var(--ink-dim)}
  .block{margin-bottom:16px; max-width:820px}
  .block h4{font-size:10.5px; text-transform:uppercase; letter-spacing:.8px; color:var(--ink-faint); margin:0 0 6px}
  .rel{display:inline-flex; align-items:center; gap:6px; font-size:12px; background:var(--panel-2); border:1px solid var(--line); border-radius:6px; padding:4px 9px; margin:0 6px 6px 0; cursor:pointer; color:var(--ink)}
  .rel:hover{border-color:var(--accent)}
  .rel .dot{width:8px; height:8px; border-radius:50%}
  .rel.missing{border-color:var(--err); color:var(--err)}
  .prose{white-space:pre-wrap; color:var(--ink-dim)}
  .read-aloud{background:var(--panel); border-left:3px solid var(--accent); border-radius:0 6px 6px 0; padding:10px 14px; font-style:italic; color:#cdd6e2; white-space:pre-wrap}
  ul.beats{margin:0; padding-left:18px; color:var(--ink-dim)}

  .report{position:fixed; right:16px; bottom:16px; width:440px; max-height:60vh; overflow:auto; background:var(--panel-2);
          border:1px solid var(--line); border-radius:10px; box-shadow:0 12px 40px rgba(0,0,0,.5); padding:12px 14px; display:none; z-index:20}
  .report.show{display:block}
  .report h4{margin:0 0 8px; font-size:12px}
  .report .item{font-size:11.5px; padding:4px 6px; border-radius:4px; margin-bottom:2px}
  .report .e{color:var(--err); background:rgba(229,96,77,.08)}
  .report .w{color:var(--warn); background:rgba(224,161,60,.08)}
  .report .close{float:right; cursor:pointer; color:var(--ink-faint)}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div><div class="brand">Augur<span class="dot">.</span> <span style="font-weight:400">Vault Loader</span></div>
      <div class="sub">Load a Markdown vault → resolve relations → validate</div></div>
    <div class="spacer"></div>
    <span class="summary" id="summary"></span>
    <button class="btn ghost" id="btnReport" style="display:none">Report</button>
    <button class="btn ghost" id="btnExport" style="display:none">Export .augur</button>
    <label class="btn ghost" for="pickAugur">Open .augur…</label>
    <input type="file" id="pickAugur" accept=".augur,.zip" />
    <label class="btn" for="pick">Choose vault folder…</label>
    <input type="file" id="pick" webkitdirectory directory multiple />
  </div>
  <div class="body">
    <aside class="bag" id="bag"></aside>
    <section class="detail" id="detail"></section>
  </div>
</div>
<div class="report" id="report"></div>

<script src="vault.js"></script>
<script src="augur-zip.js"></script>
<script>
const $=id=>document.getElementById(id);
const TYPE_ORDER=['scene','sequence','clock','npc','location','handout','creature','campaign'];
const TYPE_LABEL={scene:'Scenes',sequence:'Sequences',clock:'Clocks',npc:'NPCs',location:'Locations',handout:'Handouts',creature:'Creatures',campaign:'Campaign'};
const TYPE_VAR={scene:'--scene',sequence:'--seq-dist',clock:'--clock',npc:'--npc',location:'--location',handout:'--handout',creature:'--creature',campaign:'--accent'};
const cssv=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();
let VAULT=null, selId=null, LOADED_RECS=[];
const TYPE_FOLDERS=['scenes','sequences','clocks','npcs','locations','handouts','creatures','sessions','assets'];

function applyVault(recs){
  LOADED_RECS=recs;
  VAULT=buildVault(recs);
  VAULT.all.forEach(e=>{ e._k=e.type+'::'+e.id; });
  selId=null;
  renderSummary(); renderBag(); renderDetail(); renderReport();
  $('btnExport').style.display = VAULT.all.length ? 'inline-block' : 'none';
}
window.applyVault=applyVault;

// --- load a vault folder ---
$('pick').addEventListener('change', async e=>{
  const files=[...e.target.files]; const recs=[];
  for(const f of files){
    const rel=f.webkitRelativePath||f.name;
    const isText=/\.(md|json)$/i.test(f.name);
    let text='', bytes=null;
    if(isText){ try{ text=await f.text(); }catch(_){ } }
    else { try{ bytes=new Uint8Array(await f.arrayBuffer()); }catch(_){ } }
    recs.push({ path:rel, name:f.name, text, bytes, isText });
  }
  applyVault(recs);
});

// --- open a .augur (zip) ---
async function openAugurFile(file){
  let entries;
  try{ entries=await unzip(await file.arrayBuffer()); }
  catch(err){ alert('Could not read .augur: '+err.message); return; }
  const td=new TextDecoder();
  const recs=entries.map(en=>{
    const isText=/\.(md|json)$/i.test(en.name);
    return { path:en.name, name:en.name.split('/').pop(), text:isText?td.decode(en.bytes):'', bytes:isText?null:en.bytes, isText };
  });
  applyVault(recs);
}
window.openAugurFile=openAugurFile;
$('pickAugur').addEventListener('change', e=>{ const f=e.target.files[0]; if(f) openAugurFile(f); });

// --- export the loaded vault as a single .augur ---
async function exportAugur(){
  if(!LOADED_RECS.length) return;
  // strip a common wrapper folder so the archive has scenes/… at its root
  const firsts=LOADED_RECS.map(r=>r.path.split('/')[0]);
  const common=firsts.every(s=>s===firsts[0]) ? firsts[0] : null;
  const strip=(common && !TYPE_FOLDERS.includes(common) && !common.endsWith('.md') && !common.endsWith('.json')) ? common+'/' : '';
  const files=LOADED_RECS.map(r=>({
    name: (strip && r.path.startsWith(strip)) ? r.path.slice(strip.length) : r.path,
    data: r.isText ? (r.text||'') : (r.bytes||new Uint8Array())
  }));
  const blob=await zip(files);
  const url=URL.createObjectURL(blob);
  const title=(VAULT&&VAULT.manifest&&VAULT.manifest.title)||'campaign';
  const a=document.createElement('a');
  a.href=url; a.download=title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')+'.augur';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
window.exportAugur=exportAugur;
$('btnExport').addEventListener('click', exportAugur);

function renderSummary(){
  const i=VAULT.issues;
  $('summary').innerHTML=`<b>${VAULT.all.length}</b> entities · <b>${VAULT.sessions.length}</b> session(s) · `
    + (i.errors.length?`<span class="pill-err">${i.errors.length} error${i.errors.length>1?'s':''}</span>`:`<span class="pill-ok">0 errors</span>`)
    + ' · '
    + (i.warnings.length?`<span class="pill-warn">${i.warnings.length} warning${i.warnings.length>1?'s':''}</span>`:`<span class="pill-ok">0 warnings</span>`);
  const has=i.errors.length||i.warnings.length;
  $('btnReport').style.display=has?'inline-block':'none';
}

function renderBag(){
  const bag=$('bag'); bag.innerHTML='';
  for(const t of TYPE_ORDER){
    const items=(VAULT.byType[t]||[]).slice().sort((a,b)=>(a.title||'').localeCompare(b.title||''));
    if(!items.length) continue;
    const g=document.createElement('div'); g.className='bag-group'; g.innerHTML=`<h3>${TYPE_LABEL[t]} · ${items.length}</h3>`;
    for(const ent of items){
      const el=document.createElement('div'); el.className='bag-item'+(ent._k===selId?' sel':'');
      el.innerHTML=`<span class="swatch" style="background:${cssv(TYPE_VAR[t])}"></span>
        <div><div class="nm">${ent.title||ent.id}</div><div class="sb">${subFor(ent)}</div></div>`;
      el.onclick=()=>{ selId=ent._k; renderBag(); renderDetail(); };
      g.appendChild(el);
    }
    bag.appendChild(g);
  }
}
function subFor(ent){
  if(ent.type==='scene'&&ent.duration) return `${ent.duration.min}–${ent.duration.max} min · ${ent.duration.confidence||''}`;
  if(ent.type==='sequence') return `${ent.kind} · ${(ent.scenes||[]).length} scenes`;
  if(ent.type==='clock') return `${ent.scope||'local'} · ${ent.segments} segments`;
  return ent.id;
}

function relChip(target, ent, rid){
  if(ent){ return `<span class="rel" data-key="${ent._k}"><span class="dot" style="background:${cssv(TYPE_VAR[ent.type])}"></span>${ent.title||ent.id}</span>`; }
  return `<span class="rel missing">⚠ ${rid} (missing)</span>`;
}
function renderDetail(){
  const d=$('detail');
  if(!VAULT){ d.innerHTML=''; return; }
  const ent=VAULT.all.find(e=>e._k===selId);
  if(!ent){ d.innerHTML=`<div class="empty"><div class="big">◎</div><div>Select an entity from the Bag.</div></div>`; return; }
  const S=ent.sections||{};
  let rels='';
  const relDefs={scene:[['npcs','npc','NPCs'],['locations','location','Locations'],['clocks','clock','Clocks'],['handouts','handout','Handouts'],['creatures','creature','Creatures']],
    sequence:[['scenes','scene','Scenes (ordered)']], npc:[['locations','location','Locations'],['creatures','creature','Stat blocks']],
    location:[['npcs','npc','NPCs'],['handouts','handout','Handouts']]}[ent.type]||[];
  for(const [field,target,label] of relDefs){
    const val=ent[field]; if(val==null) continue;
    const ids=Array.isArray(val)?val:[val];
    const resolved=ent._resolved[field]||[];
    const chips=ids.map(rid=>{ const r=(Array.isArray(resolved)?resolved:[resolved]).find(x=>x&&x.id===rid); return relChip(target,r,rid); }).join('');
    rels+=`<div class="block"><h4>${label}</h4>${chips}</div>`;
  }
  if(ent.type==='location' && ent.parent){ const p=ent._resolved.parent; rels=`<div class="block"><h4>Parent location</h4>${relChip('location',p,ent.parent)}</div>`+rels; }
  if(ent.type==='clock' && ent.thresholds){
    rels+=`<div class="block"><h4>Thresholds</h4>${ent.thresholds.map(t=>{
      const tgt=t.fires==='run_beat'?VAULT.byId.get('sequence::'+t.sequence):null;
      const what=t.fires==='run_beat'?`run-beat → ${tgt?(tgt.title||t.sequence):('⚠ '+t.sequence)}`:`world-state — ${t.note}`;
      return `<div class="chip" style="margin:0 6px 6px 0">@${t.at}: ${what}</div>`; }).join('')}</div>`;
  }

  const sectionBlock=(name,cls)=> S[name]? `<div class="block"><h4>${name}</h4><div class="${cls||'prose'}">${esc(S[name])}</div></div>`:'';
  const beats= S['Beats']? `<div class="block"><h4>Beats</h4><ul class="beats">${S['Beats'].split('\n').filter(l=>l.trim().startsWith('-')).map(l=>`<li>${esc(l.replace(/^\s*-\s*/,''))}</li>`).join('')}</ul></div>`:'';

  d.innerHTML=`
    <div class="d-type">${ent.type}${ent.kind?' · '+ent.kind:''}${ent.scope?' · '+ent.scope:''}</div>
    <div class="d-title">${ent.title||ent.id}</div>
    <div class="row">
      <span class="chip">id: ${ent.id}</span>
      ${ent.duration?`<span class="chip">${ent.duration.min}–${ent.duration.max} min · ${ent.duration.confidence||''}</span>`:''}
      ${ent.ender?`<span class="chip">ender: ${ent.ender}</span>`:''}
      ${ent.tags?ent.tags.map(t=>`<span class="chip">#${t}</span>`).join(''):''}
    </div>
    ${sectionBlock('Purpose')}
    ${S['Read-aloud']?`<div class="block"><h4>Read-aloud</h4><div class="read-aloud">${esc(S['Read-aloud'])}</div></div>`:''}
    ${sectionBlock('Summary')}
    ${sectionBlock('Description')}
    ${beats}
    ${sectionBlock('Sensory')}
    ${sectionBlock('If they…')}
    ${sectionBlock('Voice')}${sectionBlock('Goals')}${sectionBlock('Secrets')}${sectionBlock('Notes')}
    ${rels}`;
  d.querySelectorAll('.rel[data-key]').forEach(el=>el.onclick=()=>{ selId=el.dataset.key; renderBag(); renderDetail(); });
}
function esc(s){ return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function renderReport(){
  const i=VAULT.issues; const r=$('report');
  r.innerHTML=`<span class="close" id="rClose">✕</span><h4>Validation report</h4>`
    + i.errors.map(e=>`<div class="item e">⛔ ${esc(e)}</div>`).join('')
    + i.warnings.map(w=>`<div class="item w">⚠ ${esc(w)}</div>`).join('')
    + (i.errors.length+i.warnings.length===0?`<div class="item" style="color:var(--good)">✓ No issues — vault is clean.</div>`:'');
  $('rClose').onclick=()=>r.classList.remove('show');
}
$('btnReport').onclick=()=>$('report').classList.toggle('show');

renderDetail();
</script>
</body>
</html>
