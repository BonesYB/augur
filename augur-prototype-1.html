/* ---------- entity editing (stage 2) ---------- */
function setSection(ent, name, content){
  content=(content||'').replace(/\s+$/,'');
  ent.sections=ent.sections||{}; if(content) ent.sections[name]=content; else delete ent.sections[name];
  const lines=(ent.body||'').split('\n'); const out=[]; let i=0, replaced=false;
  while(i<lines.length){
    const m=lines[i].match(/^##\s+(.+?)\s*$/);
    if(m && m[1].trim()===name){
      if(content){ out.push('## '+name); out.push(content); }
      i++; while(i<lines.length && !/^##\s+/.test(lines[i])) i++;
      replaced=true; continue;
    }
    out.push(lines[i]); i++;
  }

/* split a markdown body into a preamble + ordered [{name,content}] sections (mirrors parseSections). */
function bodySections(body){
  body=String(body||''); const parts=body.split(/^##\s+/m);
  const pre=(parts[0]||'').trim(); const secs=[];
  for(let k=1;k<parts.length;k++){ const seg=parts[k]; const nl=seg.indexOf('\n');
    const name=(nl<0?seg:seg.slice(0,nl)).trim(); const content=(nl<0?'':seg.slice(nl+1)).trim();
    secs.push({name,content}); }
  return {pre, secs};
}
function bodyFromSections(pre, secs){
  const blocks=secs.map(s=>'## '+s.name+(s.content?('\n'+s.content):''));
  return [pre, ...blocks].filter(Boolean).join('\n\n').replace(/\n{3,}/g,'\n\n').trim();
}

async function recsFromFolder(fileList){
  const recs=[];
  for(const f of [...fileList]){
    const rel=f.webkitRelativePath||f.name;
    const isText=/\.(md|json)$/i.test(f.name);
    let text='', bytes=null;
    if(isText){ try{ text=await f.text(); }catch(_){ } }
    else { try{ bytes=new Uint8Array(await f.arrayBuffer()); }catch(_){ } }
    recs.push({ path:rel, name:f.name, text, bytes, isText });
  }
  return recs;
}
async function recsFromAugur(file){
  let entries; try{ entries=await unzip(await file.arrayBuffer()); }
  catch(err){ uiAlert('Could not read .augur: '+err.message); return null; }
  const td=new TextDecoder();
  return entries.map(en=>{ const isText=/\.(md|json)$/i.test(en.name);
    return { path:en.name, name:en.name.split('/').pop(), text:isText?td.decode(en.bytes):'', bytes:isText?null:en.bytes, isText }; });
}

/* Build a session JSON from the live timeline (inverse of vault-adapter's clip mapping). */
function runtimeSession(){
  const base=(VAULT.sessions&&VAULT.sessions[0])||{};
  return {
    id: base.id||'session',
    title: $('sessTitle').textContent || (VAULT.manifest&&VAULT.manifest.title) || 'Session',
    playheadMinutes: Math.round(playhead),
    targetDurationMinutes: TARGET_MIN,
    clips: clips.map(c=>{
      const o={ id:c.id, sourceId:c.sourceId, sourceType:c.sourceType,
        startMinutes:Math.round(c.start), displayDurationMinutes:Math.round(c.dur), trackIndex:c.track, status:c.status };
      if(c.label) o.label=c.label;
      if(c.overlay) o.isOverlay=true;
      if(c.collapsed===false) o.collapsed=false;
      if(c.filled!=null) o.filled=c.filled;
      if(c.noteOutcome) o.outcome=c.noteOutcome;
      if(c.noteGM) o.gmNotes=c.noteGM;
      return o;
    }),
    fires: fires.map(f=>{ const o={ id:f.id, clockClipId:f.clockClipId, clockId:f.clockId, at:f.at, flavor:f.flavor, atMinutes:f.atMin };
      if(f.sequenceId) o.sequence=f.sequenceId; if(f.note) o.note=f.note; return o; }),
  };
}
/* Make sure every clip source has a real entity (synthesize for runtime-only groups/stubs). */
function ensureClipEntities(){
  for(const c of clips){
    const t=c.sourceType||'scene';
    if(VAULT.byId.get(t+'::'+c.sourceId)) continue;
    const a=ASSETS[c.sourceId]; if(!a || !/^[a-z0-9][a-z0-9-]*$/.test(c.sourceId)) continue;
    if(a.type==='sequence') createEntity(VAULT,'sequence',c.sourceId,{title:a.title||c.sourceId, kind:a.kind||'distributed', scenes:(a.sceneIds||[]).slice()}, a.summary?('## Summary\n'+a.summary):'');
    else if(a.type==='clock') createEntity(VAULT,'clock',c.sourceId,{title:a.title||c.sourceId, segments:a.segments||4, scope:a.scope||'local'}, a.summary?('## Summary\n'+a.summary):'');
    else createEntity(VAULT,'scene',c.sourceId,{title:a.title||c.sourceId, duration:{min:a.durMin||10,max:a.durMax||20,confidence:a.conf||'loose'}}, '');
  }
}
function buildExportFiles(){
  ensureClipEntities();

function downloadBlob(blob, name){
  const u=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=u; a.download=name; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(u),1500);
}

    const title=(VAULT.manifest&&VAULT.manifest.title) || $('sessTitle').textContent || 'vault';
    downloadBlob(blob, slug(title)+'.augur');

async function writeFileToDir(root, path, data){
  const parts=path.split('/'); let dir=root;
  for(let i=0;i<parts.length-1;i++) dir=await dir.getDirectoryHandle(parts[i], {create:true});
  const fh=await dir.getFileHandle(parts[parts.length-1], {create:true});
  const w=await fh.createWritable(); await w.write(data); await w.close();
}
async function saveToFolder(){
  if(!VAULT){ uiAlert('Load a vault first.'); return; }
  if(!window.showDirectoryPicker){ uiAlert('Saving in place needs a secure context (a packaged build or http://localhost). On file:// use “Save .augur” instead.'); return; }
  try{
    if(!vaultDirHandle) vaultDirHandle=await window.showDirectoryPicker({ id:'augur-vault', mode:'readwrite' });
    const files=buildExportFiles();
    for(const f of files) await writeFileToDir(vaultDirHandle, f.path, f.isText?f.text:f.bytes);

    $('saveNote').textContent='saved to folder ✓';
  }catch(e){ if(e && e.name==='AbortError') return; uiAlert('Save to folder failed: '+e.message); }
}

  if(e.key==='Escape'){

    if($('editor').classList.contains('show')){ closeEditor(); return; } closeCtx(); if(selected.size){ selected.clear(); commit(); } return; }
  if(editing) return;   // don't run timeline shortcuts while typing in the editor
  if(mod && (e.key==='z'||e.key==='Z')){ e.preventDefault(); if(e.shiftKey) redo(); else undo(); return; }
  if(mod && (e.key==='y'||e.key==='Y')){ e.preventDefault(); redo(); return; }
  if((e.key==='Delete'||e.key==='Backspace') && selected.size){ e.preventDefault(); deleteSelected(); return; }
  if(mod && (e.key==='g'||e.key==='G') && selected.size>1){ e.preventDefault(); groupSelection(); return; }
});

/* Safety net: if any transparent element ever overlays a Monitor action button and
   swallows the click, route the click to the button by geometry (capture phase, and
   only when the click did NOT already land on the button so the normal handler runs). */
document.addEventListener('click', e=>{
  for(const [id,fn] of [['btnGroup',groupSelection],['btnDelSel',deleteSelected]]){
    const b=document.getElementById(id);
    if(!b || b===e.target || b.contains(e.target)) continue;
    const r=b.getBoundingClientRect();
    if(e.clientX>=r.left && e.clientX<=r.right && e.clientY>=r.top && e.clientY<=r.bottom){ fn(); return; }
  }
}, true);

    {label:'Redo', sc:'Ctrl+Shift+Z', act:()=>$('btnRedo').click(), dis:redoStack.length===0},
    {sep:true},
    {label:'New Entity…', act:()=>$('btnNew').click(), dis:!vaultLoaded},
  ],
  View: ()=>[
    {label:'Library', act:()=>$('btnLibrary').click(), dis:!vaultLoaded},
    {label:'Vault Issues', act:()=>$('btnIssues').click(), dis:!(vaultLoaded&&VAULT&&VAULT.issues&&(VAULT.issues.errors.length+VAULT.issues.warnings.length))},
    {sep:true},
    {label:'Export Recap…', act:()=>$('btnRecap').click()},
  ],
  Help: ()=>[
    {label:'What is Augur?', act:showIntro},
    {label:'Return to guided tour', act:()=>$('btnCloseVault').click(), dis:!vaultLoaded},
  ],
};
let openMenuName=null, menuPopEl=null;
function closeMenu(){ if(menuPopEl){ menuPopEl.remove(); menuPopEl=null; } const t=document.querySelector('.menu-top.open'); if(t) t.classList.remove('open'); openMenuName=null; }
function openTopMenu(name, topBtn){
  closeMenu();
  openMenuName=name; topBtn.classList.add('open');
  const items=MENUS[name]();
  const pop=document.createElement('div'); pop.className='menu-pop';
  pop.innerHTML=items.map((it,i)=> it.sep?'<div class="menu-sep"></div>'
    : `<button${it.dis?' disabled':''} data-i="${i}">${it.label}${it.sc?`<span class="sc">${it.sc}</span>`:''}</button>`).join('');
  document.body.appendChild(pop);
  const r=topBtn.getBoundingClientRect();
  pop.style.left=Math.max(0, Math.min(r.left, window.innerWidth-pop.offsetWidth-6))+'px';
  menuPopEl=pop;
  pop.querySelectorAll('button[data-i]').forEach(b=>{ const it=items[+b.dataset.i]; b.onclick=()=>{ closeMenu(); if(it && !it.dis && it.act) it.act(); }; });
  pop.addEventListener('pointerdown', e=>e.stopPropagation());
}
document.querySelectorAll('.menu-top').forEach(t=>{
  t.addEventListener('click', e=>{ e.stopPropagation(); if(openMenuName===t.dataset.menu) closeMenu(); else openTopMenu(t.dataset.menu, t); });
  t.addEventListener('pointerenter', ()=>{ if(openMenuName && openMenuName!==t.dataset.menu) openTopMenu(t.dataset.menu, t); });
});
window.addEventListener('pointerdown', e=>{ if(menuPopEl && !menuPopEl.contains(e.target) && !e.target.closest('.menu-top')) closeMenu(); });
window.addEventListener('keydown', e=>{ if(e.key==='Escape' && openMenuName) closeMenu(); });

/* ---------- boot ---------- */
(function boot(){
  checkStorage();
  load();                 // restore saved layout if present
  fillSrdList();
  renderBag(); renderTimeline(); renderMonitor(); updateButtons();
  try{ if(!localStorage.getItem('augur-intro-seen')) showIntro(); }catch(e){}   // first run only
})();
</script>
