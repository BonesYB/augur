<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Augur</title>
<link rel="icon" type="image/svg+xml" href="AugurIcon.svg" />
<style>
  :root{
    --bg:#14161a; --panel:#1b1e24; --panel-2:#21252c; --line:#2c313a;
    --ink:#e7ebf0; --ink-dim:#9aa3af; --ink-faint:#5f6873;
    --accent:#5b9dff; --scene:#3d6fd6; --seq-tight:#7c5cff; --seq-dist:#1f9e8f;
    --clock:#e0a13c; --ender:#d65c7a; --good:#3fbf7f; --warn:#e0a13c;
    --radius:6px; --ruler-h:26px; --tl-h:360px;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    background:var(--bg); color:var(--ink);
    font:13px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    overflow:hidden; user-select:none;
    display:flex; flex-direction:column; height:100vh;
  }
  .app{display:grid; grid-template-columns:248px 1fr; grid-template-rows:1fr; flex:1; min-height:0}
  /* ---- custom desktop menu bar ---- */
  .menubar{flex:0 0 auto; display:flex; align-items:stretch; height:30px; background:var(--panel);
    border-bottom:1px solid var(--line); font-size:12px; position:relative; z-index:50}
  .menu-top{background:none; border:none; color:var(--ink-dim); padding:0 12px; cursor:pointer; font:inherit}
  .menu-top:hover, .menu-top.open{background:var(--panel-2); color:var(--ink)}
  .menu-pop{position:absolute; top:30px; background:var(--panel-2); border:1px solid var(--line);
    border-radius:0 0 8px 8px; box-shadow:0 10px 30px rgba(0,0,0,.45); padding:5px; min-width:210px; z-index:51}
  .menu-pop button{display:flex; justify-content:space-between; align-items:center; gap:18px; width:100%;
    background:none; border:none; color:var(--ink); padding:6px 10px; border-radius:5px; font:inherit; text-align:left; cursor:pointer}
  .menu-pop button:hover:not(:disabled){background:var(--accent); color:#0b0e12}
  .menu-pop button:disabled{color:var(--ink-faint); cursor:default}
  .menu-pop button .sc{font-size:11px; opacity:.7}
  .menu-pop .menu-sep{height:1px; background:var(--line); margin:5px 6px}
  #legacyBar{display:none}

  /* ---------- Bag ---------- */
  .bag{background:var(--panel); border-right:1px solid var(--line); display:flex; flex-direction:column; min-height:0}
  .bag-head{padding:12px 14px 8px; border-bottom:1px solid var(--line)}
  .logo{height:22px; width:auto; display:block}
  .bag-scroll{overflow-y:auto; padding:8px 8px 24px; flex:1}
  .bag-group{margin-bottom:6px}
  .bag-group h3{font-size:10.5px; text-transform:uppercase; letter-spacing:.7px; color:var(--ink-faint);
    margin:10px 6px 4px; font-weight:700}
  .bag-item{display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:var(--radius);
    cursor:grab; border:1px solid transparent}
  .bag-item:hover{background:var(--panel-2); border-color:var(--line)}
  .bag-item:active{cursor:grabbing}
  .swatch{width:8px; height:22px; border-radius:3px; flex:none}
  .bag-item .meta{min-width:0}
  .bag-item .name{font-size:12.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .bag-item .sub{font-size:10.5px; color:var(--ink-faint)}
  .tag{font-size:9px; text-transform:uppercase; letter-spacing:.5px; color:var(--ink-faint);
       border:1px solid var(--line); border-radius:4px; padding:0 4px; margin-left:auto}

  .main{display:grid; grid-template-rows:1fr var(--tl-h); min-width:0; min-height:0}

  /* ---------- Monitor ---------- */
  .monitor{background:var(--bg); border-bottom:1px solid var(--line); overflow-y:auto; padding:18px 22px; min-height:0}
  .mon-empty{color:var(--ink-faint); height:100%; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:6px; text-align:center}
  .mon-src{font-size:10.5px; text-transform:uppercase; letter-spacing:.8px; color:var(--ink-faint)}
  .mon-title{font-size:22px; font-weight:700; margin:2px 0 8px}
  .mon-row{display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:14px}
  .chip{font-size:11px; padding:2px 9px; border-radius:20px; border:1px solid var(--line); color:var(--ink-dim)}
  .chip.dur{border-color:var(--seq-dist); color:#5fd3c4}
  .mon-btn{background:var(--accent); color:#0b0e12; border:0; border-radius:5px; padding:6px 12px; font-size:12px; font-weight:600; cursor:pointer}
  .mon-btn.ghost{background:var(--panel-2); color:var(--ink-dim); border:1px solid var(--line)}
  .mon-btn:hover{filter:brightness(1.08)}
  /* multi-select actions: plain block buttons; container lifted above any following content */
  .mon-actions{position:relative; z-index:3; margin:10px 0 16px}
  .mon-actions .mon-btn{display:block; width:-moz-fit-content; width:fit-content; max-width:100%; margin:0 0 10px 0}
  .mon-actions .mon-btn:last-child{margin-bottom:0}
  .mon-actions .mon-btn.danger{background:#3a1f27; color:#f0a8ba; border:1px solid var(--ender)}
  .mon-actions .mon-btn.danger:hover{background:var(--ender); color:#fff; filter:none}
  .mon-block{margin-bottom:14px; max-width:760px}
  .mon-block h4{font-size:10.5px; text-transform:uppercase; letter-spacing:.8px; color:var(--ink-faint); margin:0 0 5px}
  .read-aloud{background:var(--panel); border-left:3px solid var(--accent); border-radius:0 6px 6px 0;
              padding:10px 14px; font-style:italic; color:#cdd6e2; max-width:760px}
  .read-aloud.dialogue{border-left-color:var(--seq-tight); font-style:normal; color:#ddd6f4}
  .read-aloud.dialogue .pill.ref{border-color:var(--seq-tight)}
  .read-aloud .ra-h{font-style:normal; font-size:10.5px; text-transform:uppercase; letter-spacing:.8px;
    color:var(--ink-faint); margin-bottom:5px}
  .read-aloud .ra-h .pill.ref{text-transform:none; letter-spacing:0}
  .read-aloud.dialogue .ra-h{color:var(--seq-tight)}
  .beats{margin:0; padding-left:18px; color:var(--ink-dim)} .beats li{margin:2px 0}
  .seq-scene{border-left:2px solid var(--seq-dist); padding-left:12px}
  .seq-head{color:var(--seq-dist) !important}
  .pill-row{display:flex; gap:6px; flex-wrap:wrap}
  .pill{font-size:11px; background:var(--panel-2); border:1px solid var(--line); border-radius:5px; padding:3px 8px; color:var(--ink-dim)}
  .src-note{color:var(--ink-faint); font-size:11px; margin-top:4px}
  .mon-pre{white-space:pre-wrap; color:var(--ink-dim)}
  .statblock{background:var(--panel); border:1px solid var(--line); border-left:3px solid #d8553f; border-radius:6px; padding:10px 12px; margin:0 0 10px; max-width:760px}
  .statblock.srd{border-left-color:#3fbf7f}
  .sb-title{font-weight:700; margin-bottom:6px}
  .sb-h{margin:8px 0 4px; font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--ink-faint)}
  .sb-p{font-size:12px; color:var(--ink-dim); margin:2px 0}
  .sb-note{font-size:11px; color:var(--ink-faint); margin-top:6px; font-style:italic}
  .sb-srd{font-size:12px; color:var(--ink-dim)} .sb-srd code{background:var(--panel-2); padding:1px 5px; border-radius:4px}
  .sb-table{border-collapse:collapse; margin:6px 0; font-size:12px}
  .sb-table th,.sb-table td{border:1px solid var(--line); padding:2px 8px; text-align:center; color:var(--ink-dim)}
  .sb-table th{color:var(--ink)}

  /* ---------- Timeline ---------- */
  .timeline-wrap{background:var(--panel); display:flex; flex-direction:column; min-height:0}
  .tl-resizer{height:7px; flex:none; cursor:ns-resize; background:var(--line); position:relative}
  .tl-resizer::after{content:''; position:absolute; left:50%; top:1.5px; transform:translateX(-50%);
                     width:36px; height:4px; border-radius:2px; background:var(--ink-faint)}
  .tl-resizer:hover{background:#39414d}
  .tl-bar{display:flex; align-items:center; gap:8px; padding:7px 14px; border-bottom:1px solid var(--line)}
  .tl-bar .ttl{font-weight:600; margin-right:4px}
  .tl-bar button{background:var(--panel-2); color:var(--ink-dim); border:1px solid var(--line);
                 border-radius:5px; padding:4px 9px; font-size:11px; cursor:pointer}
  .tl-bar button:hover:not(:disabled){color:var(--ink); border-color:var(--ink-faint)}
  .tl-bar button:disabled{opacity:.4; cursor:default}
  .readout{margin-left:auto; font-size:11px; color:var(--ink-dim); white-space:nowrap}
  .readout b{color:var(--ink); font-weight:600}
  .readout .over{color:var(--warn)} .readout .under{color:var(--good)} .readout .on{color:var(--good)}
  .saveNote{font-size:10.5px; color:var(--ink-faint); width:74px; text-align:right}
  .tl-hint{padding:3px 14px; font-size:10.5px; color:var(--ink-faint); border-bottom:1px solid var(--line)}
  .tl-scroll{overflow:auto; flex:1; position:relative}
  .tl-canvas{position:relative; min-height:100%}

  .ruler{position:sticky; top:0; height:var(--ruler-h); border-bottom:1px solid var(--line);
         background:var(--panel-2); z-index:6; cursor:pointer}
  .ruler .tick{position:absolute; top:0; height:100%; border-left:1px solid var(--line);
               font-size:10px; color:var(--ink-faint); padding:5px 0 0 4px}
  .ruler .tick.major{border-left-color:#3a414c}

  .lanes{position:absolute; left:0; right:0; top:var(--ruler-h); bottom:0}
  .lane{position:absolute; left:0; right:0; height:64px; border-bottom:1px dashed #232830}
  .lane-label{position:sticky; left:0; float:left; font-size:9px; color:var(--ink-faint);
              padding:2px 4px; background:rgba(27,30,36,.7); z-index:3}

  .target-marker{position:absolute; top:0; bottom:0; width:0; border-left:2px dashed var(--warn); z-index:4; pointer-events:none}
  .target-flag{position:absolute; top:2px; transform:translateX(4px); font-size:9px; color:var(--warn); white-space:nowrap}
  .target-tint{position:absolute; top:0; bottom:0; right:0; background:repeating-linear-gradient(
    -45deg, rgba(224,161,60,.03) 0 8px, transparent 8px 16px); pointer-events:none; z-index:1}

  .snap-guide{position:absolute; top:var(--ruler-h); bottom:0; width:1px; background:var(--accent);
              opacity:0; z-index:7; pointer-events:none; box-shadow:0 0 5px var(--accent)}
  .snap-guide.on{opacity:.9}

  .clip{position:absolute; height:54px; border-radius:6px; padding:6px 9px; overflow:hidden;
        border:1px solid rgba(255,255,255,.14); cursor:grab; z-index:5; color:#fff;
        box-shadow:0 2px 6px rgba(0,0,0,.35)}
  .clip:active{cursor:grabbing}
  .clip .c-title{font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .clip.seq .c-title{padding-left:20px}
  .clip .c-meta{font-size:10px; opacity:.82; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .clip.seq .c-meta{padding-left:20px}
  .clip.sel{outline:2px solid #fff; outline-offset:1px; z-index:8}
  .clip .handle{position:absolute; top:0; bottom:0; width:14px; cursor:ew-resize; z-index:9;
                display:flex; align-items:center; justify-content:center}
  .clip .handle.l{left:0} .clip .handle.r{right:0}
  .clip .handle::before{content:''; width:3px; height:56%; border-radius:2px;
                        background:rgba(255,255,255,.22); transition:background .1s, height .1s}
  .clip:hover .handle::before{background:rgba(255,255,255,.55)}
  .clip .handle:hover::before{background:#fff; height:74%; box-shadow:0 0 0 1px rgba(0,0,0,.3)}
  .clip.status-played{opacity:.5}
  .clip.status-played .c-title::after{content:' ✓'; opacity:.85}
  .clip .caret{position:absolute; left:9px; top:1px; font-size:14px; line-height:1; padding:3px; cursor:pointer; opacity:.95; z-index:10}
  .clip .caret:hover{opacity:1; color:#fff}
  .clip .segs{position:absolute; left:6px; right:6px; bottom:5px; top:25px; display:flex; gap:2px}
  .seg{flex:1; min-width:0; background:rgba(0,0,0,.18); border-radius:3px; font-size:9px; line-height:1.15;
       padding:3px 4px; overflow:hidden; cursor:pointer; color:#fff; white-space:nowrap; text-overflow:ellipsis}
  .seg:hover{background:rgba(0,0,0,.34)}
  .seg.focus{outline:1px solid #fff}

  .clip.overlay{height:30px; opacity:.92; background-image:repeating-linear-gradient(
    -45deg, rgba(0,0,0,.10) 0 6px, transparent 6px 12px)}
  .clip.overlay .c-meta{display:none}
  .clip.overlay .c-title{padding-right:74px}
  .clk-pips{font-size:9px; letter-spacing:1px; opacity:.9; margin-left:4px}
  .clk-th{font-size:9px; opacity:.7; margin-left:6px; border:1px solid rgba(255,255,255,.3); border-radius:3px; padding:0 4px}
  .clk-step{position:absolute; right:18px; top:50%; transform:translateY(-50%); display:flex; align-items:center; gap:4px; z-index:11}
  .clk-step button{width:18px; height:18px; line-height:1; padding:0; border-radius:4px; border:1px solid rgba(0,0,0,.35);
                   background:rgba(0,0,0,.28); color:#fff; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center}
  .clk-step button:hover{background:rgba(0,0,0,.55)}
  .clk-count{font-size:10px; color:#fff; min-width:26px; text-align:center; font-weight:600}

  /* point-in-time fire markers: full-height hairline + a clickable flag at top; line never blocks clips */
  .fire-marker{position:absolute; top:0; bottom:0; z-index:6; transform:translateX(-50%); width:14px; text-align:center; pointer-events:none}
  .fire-marker .fm-flag{font-size:12px; line-height:1; pointer-events:auto; filter:drop-shadow(0 1px 1px rgba(0,0,0,.6))}
  .fire-marker.run_beat .fm-flag{cursor:pointer}
  .fire-marker::after{content:''; position:absolute; left:50%; top:14px; bottom:0; width:1px; background:currentColor; opacity:.35}
  .fire-marker.run_beat{color:var(--accent)}
  .fire-marker.world_state{color:var(--clock)}
  .fire-banner{background:rgba(91,157,255,.12); border:1px solid var(--accent); border-radius:8px;
               padding:10px 12px; margin-bottom:14px; display:flex; align-items:center; gap:10px; flex-wrap:wrap}

  .playhead{position:absolute; top:0; bottom:0; width:2px; background:var(--accent); z-index:10; pointer-events:none}
  .playhead .grip{position:absolute; top:0; left:-7px; width:16px; height:var(--ruler-h);
                  background:var(--accent); border-radius:0 0 4px 4px; cursor:ew-resize; pointer-events:auto;
                  display:flex; align-items:center; justify-content:center; color:#0b0e12; font-size:10px}
  .playhead .time{position:absolute; top:var(--ruler-h); left:6px; background:var(--accent); color:#0b0e12;
                  font-size:10px; font-weight:700; padding:1px 5px; border-radius:0 4px 4px 0; white-space:nowrap}

  .drag-ghost{position:fixed; z-index:999; pointer-events:none; padding:6px 10px; border-radius:6px;
          color:#fff; font-size:12px; font-weight:600; box-shadow:0 6px 16px rgba(0,0,0,.5); opacity:.95}
  .drop-ok{outline:2px dashed var(--accent); outline-offset:-4px}

  .ctx{position:fixed; z-index:1000; background:var(--panel-2); border:1px solid var(--line);
       border-radius:8px; padding:6px; min-width:210px; box-shadow:0 10px 30px rgba(0,0,0,.5)}
  .ctx h5{margin:4px 8px; font-size:10px; text-transform:uppercase; letter-spacing:.6px; color:var(--ink-faint)}
  .ctx button{display:flex; width:100%; align-items:center; gap:8px; background:none; border:0; color:var(--ink);
              padding:6px 8px; border-radius:5px; font-size:12px; cursor:pointer; text-align:left}
  .ctx button:hover{background:var(--accent); color:#0b0e12}
  .ctx .sep{height:1px; background:var(--line); margin:5px 4px}
  .ctx .danger:hover{background:var(--ender)}

  /* entity editor modal */
  .editor{position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1100; display:none; align-items:center; justify-content:center}
  .editor.show{display:flex}
  .ed-box{background:var(--panel); border:1px solid var(--line); border-radius:10px; width:min(680px,92vw); max-height:88vh; display:flex; flex-direction:column; box-shadow:0 20px 60px rgba(0,0,0,.6)}
  .ed-head{padding:12px 16px; border-bottom:1px solid var(--line); font-weight:600}
  .ed-head code{background:var(--panel-2); padding:1px 6px; border-radius:4px; color:var(--ink-dim); font-weight:400}
  .ed-body{padding:14px 16px; overflow-y:auto}
  .ed-row{display:flex; gap:10px; flex-wrap:wrap}
  .ed-f{display:flex; flex-direction:column; gap:4px; font-size:11px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.5px; margin-bottom:12px; flex:1; min-width:120px}
  .ed-f input,.ed-f select,.ed-f textarea{font:13px/1.45 inherit; text-transform:none; letter-spacing:0; color:var(--ink); background:var(--panel-2); border:1px solid var(--line); border-radius:6px; padding:7px 9px}
  .ed-f textarea{resize:vertical; min-height:54px}
  .ed-f input:focus,.ed-f select:focus,.ed-f textarea:focus{outline:none; border-color:var(--accent)}
  .ed-foot{padding:12px 16px; border-top:1px solid var(--line); display:flex; align-items:center; gap:10px}
  .ed-foot .ed-note{color:var(--ink-faint); font-size:11px; margin-right:auto}
  .ed-foot button{background:var(--panel-2); color:var(--ink-dim); border:1px solid var(--line); border-radius:6px; padding:7px 14px; font-size:12px; cursor:pointer}
  .ed-foot button.primary{background:var(--accent); color:#0b0e12; border:0; font-weight:600}
  .ed-foot button.danger{border-color:var(--ender); color:#f0a8ba}
  .ed-foot button:hover{filter:brightness(1.08)}
  .ed-rels{border-top:1px solid var(--line); margin-top:6px; padding-top:10px}
  .ed-rels-h{font-size:10.5px; text-transform:uppercase; letter-spacing:.6px; color:var(--ink-faint); margin-bottom:8px}
  .ed-rel{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:8px}
  .ed-rel-f{font-size:11px; color:var(--ink-dim); min-width:80px}
  .rel-chips{display:flex; gap:6px; flex-wrap:wrap}
  .rel-none{font-size:11px; color:var(--ink-faint)}
  .rel-chip{display:inline-flex; align-items:center; gap:6px; font-size:11px; background:var(--panel-2); border:1px solid var(--line); border-radius:5px; padding:2px 4px 2px 8px}
  .rel-chip.missing{border-color:var(--ender); color:var(--ender)}
  .rel-go{cursor:pointer} .rel-go:hover{color:var(--accent)}
  .rel-rm{cursor:pointer; color:var(--ink-faint); font-weight:700; padding:0 3px} .rel-rm:hover{color:var(--ender)}
  .ed-rel-add,.ed-rel-new{font-size:11px; background:var(--panel-2); color:var(--ink-dim); border:1px solid var(--line); border-radius:5px; padding:3px 6px; cursor:pointer}
  .ed-rel-add:hover,.ed-rel-new:hover{border-color:var(--accent)}
  .ed-rels:empty{display:none}
  .ed-clone{display:flex; gap:8px; margin-bottom:12px}
  .ed-clone input{flex:1; font:13px inherit; color:var(--ink); background:var(--panel-2); border:1px solid var(--line); border-radius:6px; padding:7px 9px}
  .ed-clone button{background:var(--panel-2); color:var(--ink-dim); border:1px solid var(--line); border-radius:6px; padding:0 12px; cursor:pointer; font-size:12px}
  .ed-clone button:hover{border-color:var(--accent)}
  .issue{font-size:11.5px; padding:5px 8px; border-radius:5px; margin-bottom:3px}
  .issue.e{color:var(--err); background:rgba(229,96,77,.08)} .issue.w{color:var(--warn); background:rgba(224,161,60,.08)}
  .issue[data-open]{cursor:pointer} .issue[data-open]:hover{outline:1px solid var(--accent)}
  #btnIssues{border-color:var(--warn); color:var(--warn)}
  .ed-chk{justify-content:space-between}
  .ed-chk span:last-child{display:flex; align-items:center; gap:6px; font-weight:400; color:var(--ink-dim)}
  .ed-chk input{accent-color:var(--accent); width:15px; height:15px}
  .lib-grp{margin-bottom:14px} .lib-grp h4{margin:0 0 6px; font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-dim)}
  .lib-grp .lib-n{background:var(--panel-2); border-radius:8px; padding:1px 6px; font-size:10px; margin-left:4px}
  .lib-items{display:flex; flex-wrap:wrap; gap:6px}
  .lib-item{display:flex; flex-direction:column; align-items:flex-start; gap:1px; background:var(--panel-2); border:1px solid var(--line); border-radius:6px; padding:6px 9px; cursor:pointer; color:var(--ink); font:12px inherit; text-align:left}
  .lib-item:hover{border-color:var(--accent)}
  .lib-item .lib-id{font-size:10px; color:var(--ink-dim); font-family:ui-monospace,monospace}
  .pill.ref{cursor:pointer; font:inherit; border-color:var(--accent); color:var(--ink)}
  .pill.ref:hover{background:var(--accent); color:#0b0d12}
  .pill.ref::before{opacity:.85}
  .pill.ref[data-card^="npc::"]::before{content:'👤 '}
  .pill.ref[data-card^="location::"]::before{content:'📍 '}
  .pill.ref[data-card^="item::"]::before{content:'📦 '}
  .pill.ref[data-card^="trap::"]::before{content:'⚠ '}
  .pill.ref[data-card^="table::"]::before{content:'🎲 '}
  .pill.ref[data-card^="quest::"]::before{content:'🎯 '}
  .pill.ref[data-card^="creature::"]::before{content:'👹 '}
  .npc-card .npc-prose{font-size:13px; line-height:1.5; color:var(--ink-dim)}
  .npc-card .npc-prose p{margin:.2em 0}
  .npc-mood{font-size:12.5px; color:var(--ink); background:var(--panel-2); border-left:3px solid var(--accent); border-radius:0 5px 5px 0; padding:6px 10px; margin-bottom:10px}
  .npc-secret{background:rgba(224,161,60,.08); border:1px solid var(--warn); border-radius:8px; padding:4px 10px}
  .npc-secret h4{color:var(--warn)}
  .rd-target{font:inherit; font-weight:700; color:var(--ink); background:none; border:none;
    border-bottom:1px dashed var(--ink-faint); cursor:pointer; padding:0 1px}
  .rd-target:hover{color:var(--accent); border-bottom-color:var(--accent)}
  .peek-cue{display:flex; align-items:center; gap:8px; font-size:12px; color:#e8c184;
    background:rgba(224,161,60,.10); border:1px solid var(--clock); border-radius:7px;
    padding:6px 10px; margin-bottom:10px}
  .peek-cue button{margin-left:auto; background:var(--clock); color:#0b0e12; border:none;
    border-radius:5px; padding:3px 9px; font:inherit; font-weight:600; cursor:pointer}
  .mon-edit{display:flex; flex-direction:column; gap:2px; margin-top:4px; max-width:760px}
  .mon-edit .me-title{display:block; width:100%; font-size:20px; font-weight:700; color:var(--ink); background:none; border:none; outline:none; padding:2px 0}
  .mon-edit .me-meta{font-size:12px; color:var(--ink-dim); margin:0 0 10px; display:flex; align-items:center; gap:6px; flex-wrap:wrap}
  .mon-edit .me-num{width:46px; background:var(--panel-2); border:1px solid var(--line); border-radius:5px; color:var(--ink); padding:2px 5px; font:inherit; text-align:center}
  .mon-edit .me-sel{background:var(--panel-2); border:1px solid var(--line); border-radius:5px; color:var(--ink); padding:2px 4px; font:inherit}
  .mon-edit .me-chk{display:inline-flex; align-items:center; gap:4px}
  .mon-edit .mon-block{margin-bottom:10px}
  .mon-edit .me-area{display:block; width:100%; box-sizing:border-box; background:none; border:none; border-left:2px solid transparent;
    color:var(--ink-dim); font:13px/1.5 inherit; padding:1px 0 1px 9px; margin-left:-11px; resize:none; overflow:hidden; outline:none; white-space:pre-wrap}
  .mon-edit .me-area:hover{border-left-color:var(--line)}
  .mon-edit .me-area:focus{border-left-color:var(--accent); background:rgba(91,157,255,.05)}
  .mon-edit .me-area::placeholder{color:var(--ink-faint)}
  .mon-edit .me-area.readaloud{background:var(--panel); border-left:3px solid var(--accent); border-radius:0 6px 6px 0; padding:8px 10px; margin-left:0; font-style:italic; color:var(--ink)}
  .mon-edit #monRels{margin-top:6px}
  .mon-edit .me-sec-h{display:flex; align-items:center; gap:8px}
  .mon-edit .me-sec-h h4{margin:0}
  .mon-edit .me-sec-tools{display:flex; gap:3px; opacity:0; transition:opacity .1s}
  .mon-edit .me-sec:hover .me-sec-tools, .mon-edit .me-sec:focus-within .me-sec-tools{opacity:1}
  .mon-edit .me-sec-btn{background:var(--panel-2); border:1px solid var(--line); color:var(--ink-dim);
    border-radius:4px; min-width:20px; height:18px; font-size:11px; line-height:1; cursor:pointer; padding:0 4px}
  .mon-edit .me-sec-btn:hover{border-color:var(--accent); color:var(--ink)}
  .mon-edit .me-addsec{margin:10px 0 4px; background:none; border:1px dashed var(--line); color:var(--ink-dim);
    border-radius:6px; padding:6px 10px; font:inherit; cursor:pointer}
  .mon-edit .me-addsec:hover{border-color:var(--accent); color:var(--ink)}
  .pill.ref-inline{display:inline; vertical-align:baseline; margin:0 1px; padding:1px 7px}
  .ref-missing{color:var(--warn); border-bottom:1px dotted var(--warn)}
  .ref-embed{border:1px solid var(--line); border-radius:8px; padding:8px 10px; margin:6px 0; background:var(--panel)}
  .ref-embed.missing{color:var(--warn); border-color:var(--warn)}
  .re-head{display:flex; align-items:center; gap:8px; margin-bottom:5px}
  .re-type{font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-faint)}
  .re-sec{font-size:12.5px; color:var(--ink-dim); line-height:1.5; margin:2px 0}
  .re-sec b{color:var(--ink)}
  .rp-mode{display:flex; gap:6px; margin-bottom:8px}
  .rp-tog{flex:1; background:var(--panel-2); color:var(--ink-dim); border:1px solid var(--line); border-radius:6px; padding:6px; font:inherit; cursor:pointer}
  .rp-tog.on{background:var(--accent); color:#0b0e12; border-color:var(--accent); font-weight:600}
  #rpSearch{width:100%; box-sizing:border-box; background:var(--panel-2); border:1px solid var(--line); border-radius:6px; color:var(--ink); padding:7px 9px; font:inherit; margin-bottom:8px}
  .rp-list{max-height:240px; overflow-y:auto; display:flex; flex-direction:column; gap:3px; margin-bottom:8px}
  .rp-item{display:flex; justify-content:space-between; align-items:center; gap:8px; background:var(--panel-2); border:1px solid var(--line); border-radius:6px; padding:7px 9px; color:var(--ink); font:13px inherit; text-align:left; cursor:pointer}
  .rp-item:hover{border-color:var(--accent)}
  .rp-new{width:100%; background:none; border:1px dashed var(--line); border-radius:6px; color:var(--ink-dim); padding:7px; font:inherit; cursor:pointer}
  .rp-new:hover{border-color:var(--accent); color:var(--ink)}
  .notes-block{border-top:1px solid var(--line); padding-top:10px; margin-top:8px}
  .note-area{display:block; width:100%; box-sizing:border-box; background:var(--panel-2); border:1px solid var(--line);
    border-radius:6px; color:var(--ink); font:13px/1.5 inherit; padding:6px 9px; resize:none; overflow:hidden; outline:none; margin-top:3px}
  .note-area:focus{border-color:var(--accent)}
  .note-area::placeholder{color:var(--ink-faint)}
  .rec-choose{display:flex; flex-direction:column; gap:8px; margin-top:10px}
  .rec-btn{display:flex; flex-direction:column; gap:3px; align-items:flex-start; text-align:left; background:var(--panel-2);
    border:1px solid var(--line); border-radius:8px; padding:10px 12px; color:var(--ink); font:inherit; cursor:pointer}
  .rec-btn:hover{border-color:var(--accent)}
  .rec-btn span{font-size:11.5px; color:var(--ink-dim)}
  .dlg-msg{font-size:13px; line-height:1.5; color:var(--ink); white-space:pre-wrap}
  .intro-grid{display:flex; flex-direction:column; gap:10px}
  .intro-row{display:flex; gap:11px; align-items:flex-start; font-size:13px; line-height:1.45; color:var(--ink-dim)}
  .intro-row b{color:var(--ink)}
  .intro-i{flex:none; width:30px; height:30px; display:flex; align-items:center; justify-content:center;
    font-size:16px; background:var(--panel-2); border:1px solid var(--line); border-radius:8px}
</style>
</head>
<body>
<div class="menubar" id="menubar">
  <button class="menu-top" data-menu="File">File</button>
  <button class="menu-top" data-menu="Edit">Edit</button>
  <button class="menu-top" data-menu="View">View</button>
  <button class="menu-top" data-menu="Help">Help</button>
</div>
<div class="app">
  <aside class="bag">
    <div class="bag-head">
      <img class="logo" src="AugurLogo.svg" alt="Augur" />
    </div>
    <div class="bag-scroll" id="bag"></div>
  </aside>

  <div class="main">
    <section class="monitor" id="monitor"></section>

    <section class="timeline-wrap">
      <div class="tl-resizer" id="tlResizer" title="Drag up or down to resize the timeline"></div>
      <div class="tl-bar">
        <span class="ttl" id="sessTitle">Welcome to Augur — a guided tour</span>
        <button id="btnAddLane" title="Tracks are stacked rows. Add a track for parallel or contingency content — an optional encounter, a branch the party might take, a backup scene — without committing to an order. The bottom track holds overlays like clocks.">+ Track</button>
        <span class="readout" id="readout"></span>
        <span class="saveNote" id="saveNote"></span>
        <!-- action buttons live here (hidden) so the menu bar + Tauri native-dialog bridge can trigger them by id -->
        <div id="legacyBar">
          <button id="btnUndo">Undo</button>
          <button id="btnRedo">Redo</button>
          <button id="btnNewVault">New Vault</button>
          <button id="btnLoadSample">Sample</button>
          <button id="btnLoadVault">Load Vault</button>
          <button id="btnOpenAugur">.augur</button>
          <button id="btnCloseVault" style="display:none">Close Vault</button>
          <button id="btnNew" style="display:none">New</button>
          <button id="btnLibrary" style="display:none">Library</button>
          <button id="btnIssues" style="display:none">Issues</button>
          <button id="btnExport" style="display:none">Save .augur</button>
          <button id="btnSaveFolder" style="display:none">Save to folder</button>
          <button id="btnRecap">Recap</button>
          <button id="btnReset">Reset</button>
          <input type="file" id="pickVault" webkitdirectory directory multiple style="display:none" />
          <input type="file" id="pickVaultAugur" accept=".augur,.zip" style="display:none" />
        </div>
      </div>
      <div class="tl-hint">Drag from the Bag · trim edges (snaps to neighbors) · stack tracks for parallel / contingency beats · Ctrl/Cmd-click to multi-select then group · ▸ expands a sequence · double-click empty space = emergent clip · right-click a clip</div>
      <div class="tl-scroll" id="tlScroll">
        <div class="tl-canvas" id="canvas">
          <div class="ruler" id="ruler"></div>
          <div class="snap-guide" id="snapGuide"></div>
          <div class="lanes" id="lanes"></div>
          <div class="target-tint" id="tint"></div>
          <div class="target-marker" id="target"><span class="target-flag" id="targetFlag"></span></div>
          <div class="playhead" id="playhead">
            <div class="grip" title="Drag to move focus">⇿</div>
            <div class="time" id="phTime">0:00</div>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>

<div class="editor" id="editor"></div>
<div class="editor" id="dialog" style="z-index:1200"></div>
<datalist id="srdList"></datalist>
<script src="vault.js"></script>
<script src="augur-zip.js"></script>
<script src="vault-adapter.js"></script>
<script src="vault-serialize.js"></script>
<script src="vault-edit.js"></script>
<script src="srd-bestiary.js"></script>
<script>
/* =========================================================================
   Augur prototype — timeline feel + multi-select/group + undo + persistence
   Vanilla JS, no dependencies. State persists to localStorage (Prototype 2).
   ========================================================================= */

const PX_PER_MIN = 4;
const SNAP = 5;          // grid snap, minutes
const SNAP_PX = 7;       // neighbor-snap pixel threshold
const LANE_H = 64;
const RULER_H = 26;
const MIN_DUR = 10;
let TARGET_MIN = 180;   // session target length (overridden when a vault's session sets one)
const KEY = 'augur-proto1-v4';

/* ---------- built-in tutorial Bag assets (the first-run guided tour) ----------
   This sample data IS the tutorial: each block teaches a part of Augur, and the
   timeline below walks the playhead through lessons 1–9. Replaced by any loaded vault. */
const SCENES = {
  t_welcome: { id:'t_welcome', type:'scene', title:'1 · Welcome to Augur', purpose:'Get oriented — what Augur is, and how this tour works.',
    durMin:15, durMax:25, conf:'loose',
    summary:'Augur is a session planner for tabletop RPGs, built like a video editor. You lay the beats of a session on a timeline, then “cut the session as it happens” — sliding a playhead through your plan while the table plays. This very timeline is the tour: drag the playhead (the vertical line) left-to-right, or click any block, and read what appears here in the center.',
    beats:['Drag the playhead across the timeline below','Click any block to load its lesson here','Work left → right through lessons 1–9'],
    npcs:[] },
  t_bag: { id:'t_bag', type:'scene', title:'2 · The Bag (left panel)', purpose:'Your prep library — everything you might reach for this session.',
    durMin:15, durMax:25, conf:'loose',
    summary:'The Bag on the left is a shelf of reusable pieces, grouped into Scenes, Sequences, Clocks, and Session-enders. Nothing here is scheduled yet. Drag an item out of the Bag and drop it on the timeline to add it to the session; it stays in the Bag so you can reuse it. The little colored swatch tells you the item’s type at a glance.',
    beats:['Find the four groups in the left panel','Drag a Bag item onto the timeline to schedule it','Items stay in the Bag — reuse them freely'],
    npcs:[] },
  t_monitor: { id:'t_monitor', type:'scene', title:'3 · The Monitor (center panel)', purpose:'The one panel you actually read at the table.',
    durMin:20, durMax:30, conf:'tight',
    summary:'The Monitor — this center panel — always shows the single thing you need right now: the block under the playhead, or whatever you have selected. Purpose, summary, beats, read-aloud text, NPCs, and stat blocks all surface here, so you’re never flipping pages mid-scene. Selection wins; otherwise it follows the topmost block under the focus cursor.',
    readAloud:'Boxed “read-aloud” text appears in a panel like this — formatted and ready to read straight to your players.',
    beats:['Selection beats the playhead for what’s shown','Everything to run the moment lives here','In a loaded vault, click any reference chip — NPC, location, item, trap, table, quest — to open its card; cards link to each other','With a real vault loaded, an ✎ Edit button appears to change it inline'],
    npcs:['Example NPC: the Innkeeper','Example NPC: a nervous courier'] },
  t_timeline: { id:'t_timeline', type:'scene', title:'4 · The Timeline & tracks', purpose:'Sequence the session — order, length, and contingencies.',
    durMin:15, durMax:25, conf:'loose',
    summary:'The timeline runs your session left-to-right. Drag a block to reorder it; drag its left or right edge to change how long you expect it to run. Blocks on the same track *push each other* rather than overlapping, so the order stays honest.\n\n**Tracks are the stacked rows, and they’re how you plan for "maybe."** Track 1 is your through-line — the beats you expect to hit, in order. Add another track (the ＋ Track button) for *parallel or contingency* content: an optional encounter, a branch the party might take, a backup scene you may never run. A higher track doesn’t mean "later" — it means "off to the side, ready if needed." The bottom track is reserved for overlays like clocks, which span the whole session as ambient pressure. Up top, a readout compares your total planned time against your target, with a dashed target line on the canvas.',
    beats:['Drag a block to move it; drag an edge to resize it','Same-track blocks push each other — they never overlap','Track 1 = your through-line, in order','Add a track (＋ Track) for contingencies: optional, branching, or backup beats','Overlays like clocks ride the bottom track','Watch the Σ total vs. the dashed target line'],
    npcs:[] },
  t_playhead: { id:'t_playhead', type:'scene', title:'5 · The Playhead & statuses', purpose:'Track where you are and what’s already been played.',
    durMin:15, durMax:25, conf:'tight',
    summary:'The playhead is the vertical line across the timeline. Slide it to follow the table’s progress and the Monitor keeps pace. Right-click a block to mark it Played once you’ve run it (it earns a ✓) or leave it Planned. Statuses keep a long session legible at a glance — and they feed the Recap you can export when the night ends.',
    beats:['Drag the playhead to follow play','Right-click a block → mark Played / Planned','Played blocks show ✓ and feed the Recap export'],
    npcs:[] },
  t_further: { id:'t_further', type:'scene', title:'9 · Going further — your own content', purpose:'Beyond the tour: load and edit real material.',
    durMin:20, durMax:30, conf:'loose',
    summary:'This tour is built-in sample data. To run your own games, load a vault — an .augur file (or a folder of Markdown) holding your scenes, NPCs, locations, items, and monsters. Once loaded you get ✎ Edit on any entity, a 📚 Library to browse everything, a ⚠ panel that lists broken links, the full SRD 5.2 bestiary to clone stat blocks from, and a Recap export at the end of the session.',
    beats:['Open an .augur or Markdown vault to use your own content','📚 Library browses every entity; ✎ Edit changes them inline','Clone SRD monsters into stat blocks; export a Recap when you’re done'],
    npcs:[] },
  /* sub-scenes that live inside the demo sequence (lesson 6) */
  t_seq_a: { id:'t_seq_a', type:'scene', title:'Why group scenes?', purpose:'Bundle beats that belong together.',
    durMin:10, durMax:15, conf:'tight',
    summary:'Group a side-dungeon, a multi-room location, or a recurring thread so it travels as one block you can move and time as a unit. Select two or more scenes, then “Group into a sequence.”',
    beats:['Select 2+ scenes on the timeline','Use “Group into a sequence”','The new sequence lands in the Bag, reusable'],
    npcs:[] },
  t_seq_b: { id:'t_seq_b', type:'scene', title:'Expand & ungroup', purpose:'Open a sequence or break it apart.',
    durMin:10, durMax:15, conf:'tight',
    summary:'Click the ▸ caret to expand a sequence in place and focus a single scene inside it. Right-click a sequence → Ungroup to break it back into loose scenes you can rearrange individually.',
    beats:['▸ expands the sequence; click a segment to focus it','Right-click → Ungroup to split it apart'],
    npcs:[] },
};
const SEQUENCES = {
  seq_group: { id:'seq_group', type:'sequence', kind:'tight', title:'6 · Sequences — grouping', sceneIds:['t_seq_a','t_seq_b'], dur:30,
    summary:'A Sequence bundles scenes that belong together. “Tight” sequences run as one unit once entered (a bounded dungeon); “distributed” ones interleave across the session. On the timeline a sequence is one collapsible block — expand it with the ▸ caret, or right-click to Ungroup.' },
};
const CLOCKS = {
  clk_tour:{ id:'clk_tour', type:'clock', title:'7 · Clocks & fires', scope:'campaign', segments:4,
    summary:'A Clock is the world’s timer, not the party’s. It advances only when YOU tick it (the + button on the clock block), independent of the playhead. When a clock reaches a threshold it “fires” — either prompting you to run a beat (with a jump button), or changing the world-state (logged in the Monitor). Lay a clock on an overlay track so it spans the whole session as ambient pressure.',
    thresholds:[
      { at:2, fires:'run_beat', sequenceId:'seq_group' },
      { at:4, fires:'world_state', note:'The storm breaks — a consequence enters the world. World-state fires are logged here under “World-state so far.” Try ticking this clock with its + button.' },
    ] },
};
const ENDERS = {
  e_cut:{ id:'e_cut', type:'scene', _kit:'ender', title:'8 · Session-enders 🏁', purpose:'A portable beat to land the session.',
    durMin:10, durMax:20, conf:'loose', ender:true,
    summary:'Flag any scene as a Session-ender (the 🏁 toggle in its editor) when it can cleanly close a night — a cliffhanger, a hard cut, a quiet beat. Enders gather in their own Bag group, so when time’s running short you can grab one and end strong. The 🏁 shows on the block and here in the Monitor.',
    beats:['Toggle “Session ender” in a scene’s editor','Enders collect in the Bag’s Session-enders group','Drop one in when the clock on the wall is winning'],
    npcs:[] },
};

const ASSETS = {};
[SCENES,SEQUENCES,CLOCKS,ENDERS].forEach(o=>Object.values(o).forEach(a=>ASSETS[a.id]=a));
let dynamicAssets = {};                 // runtime-created (stubs + grouped sequences)
function registerAsset(a){ ASSETS[a.id]=a; dynamicAssets[a.id]=a; }

/* ---------- mutable state ---------- */
const SESSION_TITLE = 'Welcome to Augur — a guided tour';
let LANES = 4;
let playhead = 10;
let selected = new Set();               // multi-select: clip ids
let clipSeq = 1, groupSeq = 1, stubSeq = 1, fireSeq = 1;
let fires = [];                         // clock fires that have occurred
let pendingFire = null;                 // most recent run-beat fire awaiting GM action
let vaultLoaded = false;                // true once a Markdown vault replaces the seed
let VAULT = null;                       // full parsed vault — the editable source of truth in vault mode
let editEntity = null, monEditRef = null, monEdit = false;
let lastAssetRecs = [];                 // binary asset recs from the loaded vault (carried through on export)
let vaultDirHandle = null;              // File System Access handle for in-place "Save to folder"

function seedClips(){ return [
  // Lessons 1–9 run left→right on the main track; the clock overlays the whole tour.
  mkClip('t_welcome',    0,  20, 0, 'played'),
  mkClip('t_bag',       20,  20, 0, 'planned'),
  mkClip('t_monitor',   40,  25, 0, 'planned'),
  mkClip('t_timeline',  65,  20, 0, 'planned'),
  mkClip('t_playhead',  85,  20, 0, 'planned'),
  mkClip('seq_group',  105,  30, 0, 'planned'),
  mkClip('e_cut',      135,  18, 1, 'planned'),
  mkClip('t_further',  155,  25, 0, 'planned'),
  mkClip('clk_tour',     0, 180, 3, 'planned', {overlay:true}),
]; }
let clips = seedClips();

function mkClip(sourceId, start, dur, track, status, extra={}){
  const a = ASSETS[sourceId];
  return {
    id:'c'+(clipSeq++), sourceId, sourceType:a.type,
    start, dur, track, status,
    label: extra.label || null,
    overlay: extra.overlay || (a.type==='clock'),
    collapsed: a.type==='sequence' ? true : undefined,
    focusSceneId: null,
    filled: a.type==='clock' ? 0 : undefined,   // clock advancement (GM-driven)
  };
}

/* ---------- helpers ---------- */
const $ = id => document.getElementById(id);
const minToX = m => m * PX_PER_MIN;
const xToMin = x => x / PX_PER_MIN;
const snap = m => Math.max(0, Math.round(m/SNAP)*SNAP);
const fmt = m => { m=Math.round(m); const s=m<0?'-':''; m=Math.abs(m); return s+Math.floor(m/60)+':'+String(m%60).padStart(2,'0'); };
function getCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
function curTlHeight(){ return parseInt(getComputedStyle(document.documentElement).getPropertyValue('--tl-h'))||360; }
function colorFor(a){
  if(a.type==='clock') return getCss('--clock');
  if(a.type==='sequence') return a.kind==='tight'? getCss('--seq-tight'):getCss('--seq-dist');
  if(a.ender) return getCss('--ender');
  return getCss('--scene');
}
function expectedDur(a){ const d = a.dur!=null ? a.dur : Math.round((a.durMin+a.durMax)/2); return (Number.isFinite(d) && d>0) ? d : 30; }
function totalMinutes(){
  const end = clips.reduce((mx,c)=>Math.max(mx, c.start+c.dur), 0);
  return Math.max(TARGET_MIN+60, end+60);
}
function statusLabel(s){ return {planned:'planned',played:'played'}[s]||s; }
function selectOnly(id){ selected = new Set([id]); }
function toggleSel(id){ if(selected.has(id)) selected.delete(id); else selected.add(id); }
function selectClip(id){ selectOnly(id); }

/* =================== RENDER =================== */
function renderBag(){
  const scenes = Object.values(ASSETS).filter(a=>a.type==='scene' && a._kit!=='ender');
  const seqs   = Object.values(ASSETS).filter(a=>a.type==='sequence');
  const clocks = Object.values(ASSETS).filter(a=>a.type==='clock');
  const enders = Object.values(ASSETS).filter(a=>a._kit==='ender');
  const groups = [['Scenes',scenes],['Sequences',seqs],['Clocks',clocks],['Session-enders',enders]];
  const bag = $('bag'); bag.innerHTML='';
  for(const [name,items] of groups){
    const g=document.createElement('div'); g.className='bag-group'; g.innerHTML=`<h3>${name}</h3>`;
    for(const a of items){
      const el=document.createElement('div'); el.className='bag-item'; el.dataset.asset=a.id;
      const sub = a.type==='clock' ? `${a.scope} · ${a.segments} segments`
        : a.type==='sequence' ? `${a.kind} · ${a.sceneIds.length} scene${a.sceneIds.length>1?'s':''}`
        : `${a.durMin}–${a.durMax} min · ${a.conf}`;
      const tag = a.type==='sequence'?a.kind : a.type==='clock'?'clock' : (a._kit==='ender'?'ender':(a.isStub?'stub':'scene'));
      el.innerHTML = `<span class="swatch" style="background:${colorFor(a)}"></span>
        <div class="meta"><div class="name">${a.title}</div><div class="sub">${sub}</div></div>
        <span class="tag">${tag}</span>`;
      el.title='Drag onto the timeline · right-click to edit or delete';
      el.addEventListener('pointerdown', e=>startBagDrag(e, a));
      g.appendChild(el);
    }
    bag.appendChild(g);
  }
}

function renderTimeline(){
  const total = totalMinutes();
  const width = minToX(total);
  $('canvas').style.width = width+'px';
  $('canvas').style.height = (RULER_H + LANES*LANE_H + 6)+'px';

  const ruler=$('ruler'); ruler.innerHTML='';
  for(let m=0;m<=total;m+=15){
    const t=document.createElement('div'); t.className='tick'+(m%60===0?' major':'');
    t.style.left=minToX(m)+'px'; if(m%30===0) t.textContent=fmt(m);
    ruler.appendChild(t);
  }
  const lanes=$('lanes'); lanes.innerHTML='';
  lanes.style.height=(LANES*LANE_H)+'px';
  for(let i=0;i<LANES;i++){
    const l=document.createElement('div'); l.className='lane'; l.style.top=(i*LANE_H)+'px';
    const isOv=i===LANES-1;
    const lt=isOv ? 'Overlay track — clocks and session-spanning pressure live here, above the content.'
      : (i===0 ? 'Track 1 — your main through-line: the beats you expect to hit, in order.'
               : 'Track '+(i+1)+' — parallel or contingency content: optional, branching, or backup beats you might not run. Higher isn’t “later.”');
    l.innerHTML=`<span class="lane-label" title="${lt}">${isOv?'overlays':'track '+(i+1)}</span>`;
    l.dataset.lane=i; lanes.appendChild(l);
  }
  $('target').style.left=minToX(TARGET_MIN)+'px';
  $('targetFlag').textContent='target '+fmt(TARGET_MIN);
  $('tint').style.left=minToX(TARGET_MIN)+'px';
  $('tint').style.width=(width-minToX(TARGET_MIN))+'px';

  document.querySelectorAll('.clip').forEach(n=>n.remove());
  for(const c of clips) lanes.appendChild(renderClip(c));

  for(const fr of fires) lanes.appendChild(renderFireMarker(fr));

  renderPlayhead();
  updateReadout();
}

function renderFireMarker(fr){
  const m=document.createElement('div');
  m.className='fire-marker '+fr.flavor;
  m.style.left=minToX(fr.atMin)+'px';
  const label = fr.flavor==='run_beat'
    ? 'run-beat: '+((ASSETS[fr.sequenceId]||{}).title||'beat')
    : 'world-state: '+(fr.note||'');
  m.title = `${fr.clockTitle} fired @ ${fmt(fr.atMin)} — ${label}`;
  m.innerHTML=`<span class="fm-flag">⚑</span>`;
  m.querySelector('.fm-flag').addEventListener('pointerdown', e=>{ e.stopPropagation(); if(fr.flavor==='run_beat') jumpToFire(fr); });
  return m;
}

function renderClip(c){
  const a=ASSETS[c.sourceId];
  const isSeq=a.type==='sequence' && !c.overlay;
  const expanded=isSeq && !c.collapsed;
  const el=document.createElement('div');
  el.className='clip status-'+c.status+(c.overlay?' overlay':'')+(isSeq?' seq':'')
              +(selected.has(c.id)?' sel':'')+(expanded?' expanded':'');
  el.dataset.clip=c.id;
  el.style.left=minToX(c.start)+'px';
  el.style.width=Math.max(minToX(c.dur),28)+'px';
  el.style.top=(c.track*LANE_H + (c.overlay?6:5))+'px';
  el.style.background=colorFor(a);
  const title=c.label||a.title;
  let inner;
  if(a.type==='clock'){
    const seg=a.segments||4, f=Math.max(0,Math.min(a.segments||4, c.filled||0));
    const pips='●'.repeat(f)+'○'.repeat(Math.max(0,seg-f));
    const nThresh=(a.thresholds||[]).length;
    inner=`<div class="handle l"></div>
      <div class="c-title">⏱ ${title} <span class="clk-pips">${pips}</span>${nThresh?`<span class="clk-th">${nThresh} threshold${nThresh>1?'s':''}</span>`:''}</div>
      <div class="clk-step"><button class="clk-minus" title="Tick back">−</button><span class="clk-count">${f}/${seg}</span><button class="clk-plus" title="Advance the clock">+</button></div>
      <div class="handle r"></div>`;
  } else {
    inner=`<div class="handle l"></div>`;
    if(isSeq) inner+=`<span class="caret">${c.collapsed?'▸':'▾'}</span>`;
    inner+=`<div class="c-title">${title}${(a.type==='scene'&&a.ender)?' 🏁':''}</div>`;
    if(expanded){
      inner+=`<div class="segs">`+a.sceneIds.map(id=>{
        const s=ASSETS[id]; const d=expectedDur(s);
        return `<div class="seg${c.focusSceneId===id?' focus':''}" data-scene="${id}" style="flex:${d}" title="${s.title}">${s.title}</div>`;
      }).join('')+`</div>`;
    } else {
      const meta = isSeq ? `${a.sceneIds.length} scenes · ${statusLabel(c.status)}`
        : a.durMin!=null ? `${a.durMin}–${a.durMax}m · ${statusLabel(c.status)}`
        : `~${a.dur}m · ${statusLabel(c.status)}`;
      inner+=`<div class="c-meta">${meta}</div>`;
    }
    inner+=`<div class="handle r"></div>`;
  }
  el.innerHTML=inner;
  el.addEventListener('pointerdown', e=>onClipPointerDown(e,c));
  el.addEventListener('contextmenu', e=>{e.preventDefault(); openCtx(e,c);});
  el.addEventListener('dblclick', e=>{   // "I'm here now": move the playhead to this clip + select it
    if(e.target.classList.contains('caret')||e.target.classList.contains('handle')||e.target.classList.contains('clk-plus')||e.target.classList.contains('clk-minus')||e.target.closest('.seg')) return;
    e.stopPropagation(); playhead=c.start; selectOnly(c.id); commit();
  });
  return el;
}

function renderPlayhead(){ $('playhead').style.left=minToX(playhead)+'px'; $('phTime').textContent=fmt(playhead); }

function updateReadout(){
  const content=clips.filter(c=>!c.overlay);
  const end=content.reduce((m,c)=>Math.max(m,c.start+c.dur),0);
  const sum=content.reduce((s,c)=>s+c.dur,0);
  const d=end-TARGET_MIN;
  const cls=d>0?'over':(d<0?'under':'on');
  const delta=d===0?'on target':(d>0?'+'+fmt(d)+' over':fmt(d)+' under');
  $('readout').innerHTML=`Σ <b>${fmt(sum)}</b> stacked · ends <b>${fmt(end)}</b> · target <button class="rd-target" id="setTarget" type="button" title="Click to set your session length">${fmt(TARGET_MIN)}</button> <span class="${cls}">(${delta})</span> · ${content.length} clips`;
  const st=$('setTarget'); if(st) st.onclick=editTarget;
}
function editTarget(){
  const h=Math.floor(TARGET_MIN/60), m=TARGET_MIN%60;
  $('editor').innerHTML=`<div class="ed-box" style="max-width:330px">
    <div class="ed-head">Session Target Length</div>
    <div class="ed-body"><div class="ed-row">
        <label class="ed-f">Hours<input type="number" id="tgtH" min="0" max="24" value="${h}"></label>
        <label class="ed-f">Minutes<input type="number" id="tgtM" min="0" max="59" value="${m}"></label>
      </div><div class="ed-note">How long you expect tonight's session to run.</div></div>
    <div class="ed-foot"><button id="tgtCancel">Cancel</button><button id="tgtOk" class="primary">Set</button></div></div>`;
  $('editor').classList.add('show');
  $('editor').onclick=ev=>{ if(ev.target===$('editor')) closeEditor(); };
  $('tgtCancel').onclick=closeEditor;
  const apply=()=>{
    const hh=Math.max(0,parseInt($('tgtH').value,10)||0), mm=Math.max(0,Math.min(59,parseInt($('tgtM').value,10)||0));
    const total=hh*60+mm;
    if(total<=0){ $('tgtH').focus(); return; }
    pushHistory(); TARGET_MIN=total; closeEditor(); commit();
  };
  $('tgtOk').onclick=apply;
  $('editor').querySelectorAll('#tgtH,#tgtM').forEach(i=>i.addEventListener('keydown',e=>{ if(e.key==='Enter') apply(); }));
  $('tgtH').focus(); $('tgtH').select();
}

function mdInline(s){ return _esc(s)
  .replace(/\*\*\*([^*]+)\*\*\*/g,'<strong><em>$1</em></strong>')
  .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
  .replace(/\*([^*]+)\*/g,'<em>$1</em>'); }
/* light Markdown → HTML for stat blocks: pipe tables, ##-#### headings, bold/italic, lines */
function mdLite(md){
  const lines=String(md||'').split('\n'); let html=''; let i=0;
  while(i<lines.length){
    const l=lines[i];
    if(l.trim()===''){ i++; continue; }
    if(l.includes('|') && i+1<lines.length && /^[\s|:-]+$/.test(lines[i+1])){
      const cells=x=>x.replace(/^\||\|$/g,'').split('|').map(c=>c.trim());
      const head=cells(l); i+=2; const rows=[];
      while(i<lines.length && lines[i].includes('|')){ rows.push(cells(lines[i])); i++; }
      html+='<table class="sb-table"><thead><tr>'+head.map(h=>'<th>'+mdInline(h)+'</th>').join('')
          +'</tr></thead><tbody>'+rows.map(r=>'<tr>'+r.map(c=>'<td>'+mdInline(c)+'</td>').join('')+'</tr>').join('')+'</tbody></table>';
      continue;
    }
    const hm=l.match(/^#{2,4}\s+(.+)$/);
    if(hm){ html+='<h5 class="sb-h">'+mdInline(hm[1])+'</h5>'; i++; continue; }
    html+='<div class="sb-p">'+mdInline(l)+'</div>'; i++;
  }
  return html;
}
/* render a bundled SRD 5.2 (2024) monster (schema from srd-bestiary.js) as Markdown */
function srdToMarkdown(m){
  let md=`**${m.name}**\n*${m.meta}*\n\n- **AC** ${m.ac}${m.init?`   **Initiative** ${m.init}`:''}\n- **HP** ${m.hp}\n- **Speed** ${m.speed}\n\n`;
  md+=`| STR | DEX | CON | INT | WIS | CHA |\n|---|---|---|---|---|---|\n| ${m.abil.map(a=>`${a[0]} (${a[1]})`).join(' | ')} |\n\n`;
  if(m.saves)md+=`- **Saving Throws** ${m.saves}\n`;
  if(m.skills)md+=`- **Skills** ${m.skills}\n`;
  if(m.vulnerabilities)md+=`- **Vulnerabilities** ${m.vulnerabilities}\n`;
  if(m.resistances)md+=`- **Resistances** ${m.resistances}\n`;
  if(m.immunities)md+=`- **Immunities** ${m.immunities}\n`;
  if(m.gear)md+=`- **Gear** ${m.gear}\n`;
  md+=`- **Senses** ${m.senses}\n- **Languages** ${m.languages}\n- **CR** ${m.cr}\n`;
  for(const sec of (m.sections||[])){ md+=`\n### ${sec[0]}\n`; for(const e of sec[1]) md+= e[0]?`\n***${e[0]}.*** ${e[1]}\n`:`\n${e[1]}\n`; }
  return md;
}
function statBlockHtml(c){
  const head=`<div class="sb-title">${mdInline(c.title)}${c.cr!=null?` · CR ${c.cr}`:''}</div>`;
  const note=c.notes?`<div class="sb-note">${mdInline(c.notes)}</div>`:'';
  if(c.statblock) return `<div class="statblock">${head}${mdLite(c.statblock)}${note}</div>`;   // GM's custom block wins
  if(c.srd){
    const m=(typeof SRD_BESTIARY!=='undefined') && SRD_BESTIARY[c.srd];
    if(m) return `<div class="statblock srd">${mdLite(srdToMarkdown(m))}${note}</div>`;
    return `<div class="statblock srd">${head}<div class="sb-srd">SRD: <code>${_esc(c.srd)}</code> — not in the bundled bestiary yet (add it to srd-bestiary.js)</div>${note}</div>`;
  }
  return `<div class="statblock">${head}${note}</div>`;
}
function pillBlock(label, names){ return names&&names.length?`<div class="mon-block"><h4>${label}</h4><div class="pill-row">${names.map(n=>`<span class="pill">${_esc(n)}</span>`).join('')}</div></div>`:''; }
/* refPills: clickable chips for scene-referenced entities (string fallback for the built-in tour). */
function refPills(label, type, arr){
  if(!arr||!arr.length) return '';
  return `<div class="mon-block"><h4>${label}</h4><div class="pill-row">${arr.map(r=>{
      const t=(r&&typeof r==='object')?r.title:r; const id=(r&&typeof r==='object')?r.id:null;
      return id?`<button class="pill ref" type="button" data-card="${type}::${_esc(id)}" title="Open ${type} details">${_esc(t)}</button>`:`<span class="pill">${_esc(t)}</span>`;
    }).join('')}</div></div>`;
}
/* ---------- inline references: [[id]] link chips + ![[id]] embeds ---------- */
const REF_TYPE_ORDER=['creature','npc','location','item','trap','table','quest','scene','sequence','clock','handout'];
function resolveRef(ref){
  if(!VAULT) return null;
  ref=String(ref||'').trim().replace('::',':');
  if(ref.includes(':')){ const i=ref.indexOf(':'); const t=ref.slice(0,i).trim(), id=ref.slice(i+1).trim(); const e=VAULT.byId.get(t+'::'+id); return e?{type:t,id,ent:e}:null; }
  for(const t of REF_TYPE_ORDER){ const e=VAULT.byId.get(t+'::'+ref); if(e) return {type:t,id:ref,ent:e}; }
  return null;
}
function refChipHtml(ref){
  const r=resolveRef(ref);
  if(!r) return `<span class="ref-missing">[[${_esc(ref)}]]</span>`;
  return `<button class="pill ref ref-inline" type="button" data-card="${r.type}::${_esc(r.id)}">${_esc(r.ent.title||r.id)}</button>`;
}
function refEmbedHtml(ref){
  const r=resolveRef(ref);
  if(!r) return `<div class="ref-embed missing">![[${_esc(ref)}]] — not found</div>`;
  const ent=r.ent, S=ent.sections||{};
  const icon=(typeof CARD_ICON!=='undefined' && CARD_ICON[r.type])||'•';
  const head=`<div class="re-head"><button class="pill ref ref-inline" type="button" data-card="${r.type}::${_esc(ent.id)}">${icon} ${_esc(ent.title||ent.id)}</button> <span class="re-type">${r.type}</span></div>`;
  if(r.type==='creature'){
    const cref={ id:ent.id, title:ent.title, srd:ent.srd||null, cr:(ent.cr!=null?ent.cr:null), statblock:S['Statblock']||S['Stat block']||null, notes:S['Notes']||null };
    return `<div class="ref-embed">${statBlockHtml(cref)}</div>`;
  }
  const fields=(SECTION_FIELDS[r.type]||['Notes']).filter(f=>f!=='Statblock');
  let secs=''; for(const f of fields){ if(S[f]) secs+=`<div class="re-sec"><b>${f}:</b> ${renderProse(S[f], true)}</div>`; }
  return `<div class="ref-embed">${head}${secs||'<div class="re-sec ed-note">No details yet.</div>'}</div>`;
}
/* escape + light markdown + reference tokens. noEmbed=true (inside an embed) downgrades nested embeds to chips. */
function inlineProse(s, noEmbed){
  s=_esc(String(s==null?'':s));
  s=s.replace(/\*\*\*([^*]+)\*\*\*/g,'<strong><em>$1</em></strong>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>');
  s=s.replace(/(!?)\[\[([^\]]+)\]\]/g,(m,bang,ref)=> bang ? (noEmbed?refChipHtml(ref):refEmbedHtml(ref)) : refChipHtml(ref));   // single pass: embed output isn't re-scanned
  return s;
}
/* block-aware: lines beginning with '>' become a read-aloud box; blank lines = paragraph breaks. */
function renderProse(text, noEmbed){
  if(text==null||text==='') return '';
  const lines=String(text).split('\n'); const out=[]; let i=0;
  while(i<lines.length){
    if(/^\s*>\s?/.test(lines[i])){
      const buf=[]; while(i<lines.length && /^\s*>\s?/.test(lines[i])){ buf.push(lines[i].replace(/^\s*>\s?/,'')); i++; }
      const isDlg=/^\s*\*\*.+:\*\*/.test(buf[0]||'');   // leads with a bold speaker → NPC dialogue
      let hdr, bodyLines;
      if(isDlg){ hdr=inlineProse((buf[0]||'').replace(/:\*\*(\s*)$/,'**$1'), noEmbed); bodyLines=buf.slice(1); }   // speaker = header (colon dropped)
      else { hdr='Read-aloud'; bodyLines=buf; }
      const body=inlineProse(bodyLines.join('\n'), noEmbed).replace(/\n/g,'<br>');
      out.push(`<div class="read-aloud${isDlg?' dialogue':''}"><div class="ra-h">${hdr}</div><div class="ra-body">${body}</div></div>`);
    } else {
      const buf=[]; while(i<lines.length && !/^\s*>\s?/.test(lines[i])){ buf.push(lines[i]); i++; }
      out.push(inlineProse(buf.join('\n'),noEmbed).replace(/\n{2,}/g,'<br><br>'));
    }
  }
  return out.join('');
}
/* read-view scene body. Vault scenes render every section in saved order (incl. custom);
   the built-in tour scenes (no .sections) use the legacy fixed-field layout. */
function sceneInner(a){
  if(a.sections) return sceneInnerSections(a);
  return sceneInnerLegacy(a);
}
const PRE_SECTIONS=new Set(['Sensory','If they…','If they...','Treasure','Loot']);   // render monospace-ish
function sceneInnerSections(a){
  let html='';
  for(const name of Object.keys(a.sections)){
    const content=a.sections[name];
    if(!content || !String(content).trim()) continue;   // skip empty sections in read view
    if(name==='Beats'){
      const items=String(content).split('\n').filter(l=>l.trim().startsWith('-')).map(l=>l.replace(/^\s*-\s*/,'').trim()).filter(Boolean);
      if(items.length) html+=`<div class="mon-block"><h4>Beats</h4><ul class="beats">${items.map(b=>`<li>${renderProse(b)}</li>`).join('')}</ul></div>`;
      continue;
    }
    if(name==='Read-aloud'){   // legacy "## Read-aloud" section: box it once (strip any '>' so renderProse won't nest a box)
      html+=`<div class="mon-block"><h4>Read-aloud</h4><div class="read-aloud">${renderProse(String(content).replace(/^\s*>\s?/gm,''))}</div></div>`;
      continue;
    }
    if(name==='Statblock'||name==='Stat block'||name==='Stat Block') continue;   // creatures handled below
    const cls=PRE_SECTIONS.has(name)?' class="mon-pre"':'';
    html+=`<div class="mon-block"><h4>${_esc(name)}</h4><div${cls}>${renderProse(content)}</div></div>`;
  }
  if(a.creatures&&a.creatures.length) html+=`<div class="mon-block"><h4>Creatures &amp; stat blocks</h4>${a.creatures.map(statBlockHtml).join('')}</div>`;
  html+=refPills('NPCs','npc',a.npcs)+refPills('Locations','location',a.locations)+refPills('Items','item',a.items)
       +refPills('Traps','trap',a.traps)+refPills('Tables','table',a.tables)+refPills('Quests','quest',a.quests);
  return html;
}
function sceneInnerLegacy(a){
  return `${a.purpose?`<div class="mon-block"><h4>Purpose</h4>${renderProse(a.purpose)}</div>`:''}
    ${a.readAloud?`<div class="mon-block"><h4>Read-aloud</h4><div class="read-aloud">${renderProse(a.readAloud)}</div>
       <div class="src-note">Read-aloud / “box text” — in Augur, paste your own verbatim prose from your licensed material here.</div></div>`:''}
    ${a.summary?`<div class="mon-block"><h4>Summary</h4>${renderProse(a.summary)}</div>`:''}
    ${a.beats&&a.beats.length?`<div class="mon-block"><h4>Beats</h4><ul class="beats">${a.beats.map(b=>`<li>${renderProse(b)}</li>`).join('')}</ul></div>`:''}
    ${a.sensory?`<div class="mon-block"><h4>Sensory</h4><div class="mon-pre">${renderProse(a.sensory)}</div></div>`:''}
    ${a.ifThey?`<div class="mon-block"><h4>If they…</h4><div class="mon-pre">${renderProse(a.ifThey)}</div></div>`:''}
    ${a.creatures&&a.creatures.length?`<div class="mon-block"><h4>Creatures & stat blocks</h4>${a.creatures.map(statBlockHtml).join('')}</div>`:''}
    ${a.treasure?`<div class="mon-block"><h4>Treasure</h4><div class="mon-pre">${renderProse(a.treasure)}</div></div>`:''}
    ${refPills('NPCs','npc',a.npcs)}
    ${refPills('Locations','location',a.locations)}
    ${refPills('Items','item',a.items)}
    ${refPills('Traps','trap',a.traps)}
    ${refPills('Tables','table',a.tables)}
    ${refPills('Quests','quest',a.quests)}`;
}

/* =================== INTERACTION =================== */
let drag=null;
function onClipPointerDown(e,c){
  if(e.button!==0) return;
  // clock advance / retract steppers (GM-driven, decoupled from the playhead)
  if(e.target.classList.contains('clk-plus')){  e.stopPropagation(); stepClock(c, 1);  return; }
  if(e.target.classList.contains('clk-minus')){ e.stopPropagation(); stepClock(c, -1); return; }
  // caret toggles collapse (view-only, not undoable)
  if(e.target.classList.contains('caret')){ e.stopPropagation(); c.collapsed=!c.collapsed; if(c.collapsed) c.focusSceneId=null; commit(); return; }
  // clicking an expanded segment focuses that scene
  const seg=e.target.closest('.seg');
  if(seg){ e.stopPropagation(); selectOnly(c.id); c.focusSceneId=seg.dataset.scene; commit(); return; }

  const isHandle=e.target.classList.contains('handle');
  const side=e.target.classList.contains('l')?'l':'r';
  e.stopPropagation();

  if(e.metaKey||e.ctrlKey||e.shiftKey){ toggleSel(c.id); commit(); return; }   // modifier = multi-select, no drag
  if(!selected.has(c.id)) selectOnly(c.id);
  renderTimeline(); renderMonitor();

  const items = isHandle ? [{c,start:c.start,dur:c.dur,track:c.track}]
    : [...selected].map(id=>{const cc=clips.find(x=>x.id===id); return {c:cc,start:cc.start,dur:cc.dur,track:cc.track};});
  drag={ primary:c, mode:isHandle?('trim-'+side):'move', startX:e.clientX, startY:e.clientY, moved:false, items,
    allOrig: clips.map(x=>({c:x, start:x.start, track:x.track})) };   // for reversible ripple of neighbors
  window.addEventListener('pointermove', onDragMove);
  window.addEventListener('pointerup', onDragUp, {once:true});
}

function snapEdges(exclude){
  const ex=new Set(exclude); const out=[];
  for(const c of clips){ if(ex.has(c))continue; out.push(c.start, c.start+c.dur); }
  out.push(playhead, TARGET_MIN, 0);
  return out;
}
function snapValue(target, candidates, thr){
  let best=null, bestD=thr;
  for(const cand of candidates){ const d=Math.abs(target-cand); if(d<=bestD){ bestD=d; best=cand; } }
  return best;
}
function showGuide(min){ const g=$('snapGuide'); if(min==null){ g.classList.remove('on'); return; } g.style.left=minToX(min)+'px'; g.classList.add('on'); }

function onDragMove(e){
  if(!drag) return;
  if(!drag.moved && (Math.abs(e.clientX-drag.startX)>2||Math.abs(e.clientY-drag.startY)>2)){ drag.moved=true; pushHistory(); }
  if(!drag.moved) return;
  const ds=new Set(drag.items.map(it=>it.c));
  if(drag.allOrig) for(const o of drag.allOrig){ if(!ds.has(o.c)){ o.c.start=o.start; o.c.track=o.track; } }   // reset neighbors → originals (reversible)
  const dxMin=xToMin(e.clientX-drag.startX);
  const thr=SNAP_PX/PX_PER_MIN;

  if(drag.mode==='move'){
    const p=drag.items.find(it=>it.c===drag.primary);
    let ns=p.start+dxMin, guide=null;
    const edges=snapEdges(drag.items.map(it=>it.c));
    const ss=snapValue(ns,edges,thr), se=snapValue(ns+p.dur,edges,thr);
    if(ss!=null){ ns=ss; guide=ss; } else if(se!=null){ ns=se-p.dur; guide=se; } else { ns=snap(ns); }
    ns=Math.max(0,ns);
    const delta=ns-p.start;
    const dT=Math.round((e.clientY-drag.startY)/LANE_H);
    for(const it of drag.items){
      it.c.start=Math.max(0,it.start+delta);
      it.c.track=Math.min(LANES-1,Math.max(0,it.track+dT));
    }
    showGuide(guide);
  } else if(drag.mode==='trim-r'){
    const it=drag.items[0]; const edges=snapEdges([it.c]);
    let end=it.start+it.dur+dxMin; const se=snapValue(end,edges,thr);
    if(se!=null){ end=se; showGuide(se); } else { end=snap(end); showGuide(null); }
    it.c.dur=Math.max(MIN_DUR, end-it.start);
  } else if(drag.mode==='trim-l'){
    const it=drag.items[0]; const edges=snapEdges([it.c]);
    let ns=it.start+dxMin; const ss=snapValue(ns,edges,thr);
    if(ss!=null){ ns=ss; showGuide(ss); } else { ns=snap(ns); showGuide(null); }
    ns=Math.min(it.start+it.dur-MIN_DUR, Math.max(0,ns));
    it.c.dur=it.start+it.dur-ns; it.c.start=ns;
  }
  rippleResolve(ds);
  renderTimeline(); renderMonitor();
}
/* resolve overlaps on one track: pack overlapping left-neighbors; if they'd cross 0, the dragged clip(s)
   get blocked (shifted right) so nothing overlaps; then push right-neighbors. Gaps preserved. */
function resolveTrack(tr, draggedArr){
  const others=clips.filter(c=>!draggedArr.includes(c) && c.track===tr && !c.overlay);
  let dStart=Infinity, dEnd=-Infinity;
  for(const d of draggedArr){ dStart=Math.min(dStart,d.start); dEnd=Math.max(dEnd,d.start+d.dur); }
  const origStart=dStart;
  // LEFT
  const left=others.filter(c=>c.start<origStart).sort((a,b)=>b.start-a.start);
  let boundary=dStart, minStart=0; const packed=[];
  for(const c of left){ const ns=(c.start+c.dur>boundary)?boundary-c.dur:c.start; packed.push([c,ns]); boundary=ns; if(ns<minStart) minStart=ns; }
  if(minStart<0){ const shift=-minStart; for(const d of draggedArr) d.start+=shift; dEnd+=shift; for(const p of packed) p[1]+=shift; }
  for(const p of packed) p[0].start=p[1];
  // RIGHT
  const right=others.filter(c=>c.start>=origStart).sort((a,b)=>a.start-b.start);
  let cur=dEnd; for(const c of right){ if(c.start<cur) c.start=cur; cur=Math.max(cur, c.start+c.dur); }
}
function rippleResolve(ds){
  const trackSet=new Set();
  for(const it of drag.items){ if(!it.c.overlay) trackSet.add(it.c.track); }
  for(const tr of trackSet){
    const dragged=clips.filter(c=>ds.has(c) && c.track===tr && !c.overlay);
    if(dragged.length) resolveTrack(tr, dragged);
  }
}
function rippleForClip(nc){ if(!nc.overlay) resolveTrack(nc.track, [nc]); }
function onDragUp(){
  window.removeEventListener('pointermove', onDragMove);
  showGuide(null);
  drag=null;
  commit();
}

/* ---------- Bag → Timeline ---------- */
let bagDrag=null;
function startBagDrag(e,a){
  e.preventDefault();
  const ghost=document.createElement('div');
  ghost.className='drag-ghost'; ghost.textContent=a.title; ghost.style.background=colorFor(a);
  document.body.appendChild(ghost);
  bagDrag={a,ghost}; moveGhost(e);
  window.addEventListener('pointermove', onBagMove);
  window.addEventListener('pointerup', onBagUp, {once:true});
}
function moveGhost(e){ bagDrag.ghost.style.left=(e.clientX+12)+'px'; bagDrag.ghost.style.top=(e.clientY+10)+'px'; }
function onBagMove(e){
  moveGhost(e);
  const r=$('lanes').getBoundingClientRect();
  const over=e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom;
  $('canvas').classList.toggle('drop-ok', over);
}
function onBagUp(e){
  window.removeEventListener('pointermove', onBagMove);
  $('canvas').classList.remove('drop-ok');
  const r=$('lanes').getBoundingClientRect(); const scroll=$('tlScroll');
  if(e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom){
    pushHistory();
    const a=bagDrag.a;
    const startMin=snap(xToMin(e.clientX - r.left + scroll.scrollLeft));
    let track=Math.min(LANES-1,Math.max(0,Math.floor((e.clientY-r.top)/LANE_H)));
    if(a.type==='clock') track=LANES-1;
    const dur=a.type==='clock'?(a.segments*30):expectedDur(a);
    const c=mkClip(a.id, startMin, dur, track, 'planned');
    clips.push(c); rippleForClip(c); selectOnly(c.id); commit();   // push neighbors out of overlap on drop
  }
  bagDrag.ghost.remove(); bagDrag=null;
}

/* ---------- Playhead ---------- */
function setPlayheadFromClientX(clientX){
  const r=$('lanes').getBoundingClientRect(); const scroll=$('tlScroll');
  playhead=snap(Math.max(0, xToMin(clientX - r.left + scroll.scrollLeft)));
  renderPlayhead(); renderMonitor();
}
$('playhead').querySelector('.grip').addEventListener('pointerdown', e=>{
  e.preventDefault(); e.stopPropagation();
  const mv=ev=>setPlayheadFromClientX(ev.clientX);
  window.addEventListener('pointermove', mv);
  window.addEventListener('pointerup', ()=>{window.removeEventListener('pointermove', mv); save();}, {once:true});
});
$('ruler').addEventListener('pointerdown', e=>{ setPlayheadFromClientX(e.clientX); save(); });

/* ---------- empty-space click / emergent clip ---------- */
function isEmpty(t){ return t.id==='lanes'||t.classList.contains('lane')||t.classList.contains('lane-label'); }
$('lanes').addEventListener('pointerdown', e=>{
  if(e.button!==0) return;
  if(isEmpty(e.target)){ setPlayheadFromClientX(e.clientX); if(selected.size) selected.clear(); commit(); }   // click empty = scrub + deselect
});
$('lanes').addEventListener('dblclick', async e=>{
  if(!isEmpty(e.target)) return;
  const r=$('lanes').getBoundingClientRect(); const scroll=$('tlScroll');
  const startMin=snap(xToMin(e.clientX - r.left + scroll.scrollLeft));
  let track=Math.min(LANES-2,Math.max(0,Math.floor((e.clientY-r.top)/LANE_H)));
  const title=(await uiPrompt({title:'Emergent clip', label:'What happened? Creates a 15-min clip + a Bag stub.', placeholder:'e.g. The ambush at the ford'})||'').trim();
  if(!title) return;
  pushHistory();
  const id='stub_'+(stubSeq++);
  registerAsset({id,type:'scene',title,purpose:'Emergent — flesh this stub out later',
    durMin:15,durMax:15,conf:'loose',isStub:true,
    summary:'Captured live as an emergent clip. Stub created in the Bag.',beats:[],npcs:[]});
  const c=mkClip(id,startMin,15,track,'planned');
  clips.push(c); selectOnly(c.id); commit();
});

/* ---------- group / ungroup / delete ---------- */
function groupSelection(){
  const cs=[...selected].map(id=>clips.find(c=>c.id===id)).filter(Boolean).filter(c=>c.sourceType==='scene');
  if(cs.length<2) return;
  pushHistory();
  cs.sort((a,b)=>a.start-b.start);
  const sceneIds=cs.map(c=>c.sourceId);
  const dur=cs.reduce((s,c)=>s+c.dur,0);
  const id='seqg_'+(groupSeq++);
  registerAsset({id,type:'sequence',kind:'distributed',title:'New Sequence ('+cs.length+' scenes)',sceneIds,dur,_grouped:true,
    summary:'Grouped from '+cs.length+' scene clips on the timeline.'});
  const ids=new Set(cs.map(c=>c.id));
  const start=cs[0].start, track=cs[0].track;
  clips=clips.filter(c=>!ids.has(c.id));
  const nc=mkClip(id,start,dur,track,'planned'); nc.collapsed=true;
  clips.push(nc); selectOnly(nc.id); commit();
}
function ungroup(c){
  const a=ASSETS[c.sourceId];
  if(a.type!=='sequence') return;
  const idx=clips.indexOf(c);
  let start=c.start; const made=[];
  for(const id of a.sceneIds){ const s=ASSETS[id]; const d=expectedDur(s); const nc=mkClip(id,start,d,c.track,c.status); made.push(nc); start+=d; }
  clips.splice(idx,1,...made);
  selected=new Set(made.map(x=>x.id));
}
function deleteSelected(){
  if(!selected.size) return;
  pushHistory();
  clips=clips.filter(c=>!selected.has(c.id));
  selected.clear(); commit();
}

/* ---------- clocks: advance / retract / fire ---------- */
function stepClock(c, dir){
  const a=ASSETS[c.sourceId];
  const seg=a.segments||4;
  const f=Math.max(0,Math.min(seg, c.filled||0));
  const nf=Math.max(0,Math.min(seg, f+dir));
  if(nf===f) return;
  pushHistory();
  if(dir>0){
    for(const t of (a.thresholds||[])) if(t.at===nf) fireThreshold(c,a,t);
  } else {
    // retracting out of segment f un-does any fire recorded at that segment
    fires=fires.filter(fr=>!(fr.clockClipId===c.id && fr.at===f));
    if(pendingFire && pendingFire.clockClipId===c.id && pendingFire.at===f) pendingFire=null;
  }
  c.filled=nf;
  commit();

/* ---------- Markdown recap (played + fires) ---------- */
/* Build a Markdown recap. mode='gm' = full game state; mode='player' = outcomes only (no secrets/GM notes). */
function buildRecap(mode){
  const title=$('sessTitle').textContent||SESSION_TITLE;
  const played=clips.filter(c=>!c.overlay && c.status==='played').sort((a,b)=>a.start-b.start);
  const end=clips.filter(c=>!c.overlay).reduce((m,c)=>Math.max(m,c.start+c.dur),0);
  const L=[];
  L.push(`# ${title} — ${mode==='player'?'Recap':'GM Recap'}`); L.push('');
  if(!played.length){ L.push('_Nothing marked played yet — right-click a clip and "Mark as played" as you run it._'); return L.join('\n'); }
  if(mode==='gm'){ L.push(`Target ${fmt(TARGET_MIN)} · ran to ${fmt(end)} · ${played.length} scene${played.length===1?'':'s'} played.`); L.push(''); }
  L.push(mode==='player'?'## Previously…':'## Played, in order');
  played.forEach((c,i)=>{
    const a=ASSETS[c.sourceId]||{}; const name=c.label||a.title||c.sourceId;
    if(mode==='player'){
      L.push(`### ${name}`);
      L.push(c.noteOutcome ? c.noteOutcome : '_(no notes recorded)_');
      L.push('');
    } else {
      const seq=a.type==='sequence'?'  ·  '+(a.sceneIds||[]).map(id=>(ASSETS[id]||{}).title||id).join(' → '):'';
      L.push(`### ${i+1}. ${name}  ·  ${c.dur}m${seq}`);
      if(c.noteOutcome) L.push('**What happened:** '+c.noteOutcome);
      if(c.noteGM) L.push('**GM:** '+c.noteGM);
      if(!c.noteOutcome && !c.noteGM) L.push('_(no notes)_');
      L.push('');
    }
  });
  if(mode==='gm'){
    L.push('## World pressure (clocks)');
    const clockClips=clips.filter(c=>c.overlay);
    if(!clockClips.length) L.push('_No clocks on the timeline._');
    clockClips.forEach(c=>{ const a=ASSETS[c.sourceId]||{};
      L.push(`- **${a.title}** — ${c.filled||0}/${a.segments} filled`);
      fires.filter(f=>f.clockClipId===c.id).sort((x,y)=>x.atMin-y.atMin).forEach(fr=>{
        if(fr.flavor==='run_beat'){ const s=ASSETS[fr.sequenceId]; L.push(`  - fired @ ${fmt(fr.atMin)}: run **${s?s.title:'beat'}**`); }
        else L.push(`  - fired @ ${fmt(fr.atMin)}: world-state — ${fr.note||''}`); });
    });
    const planned=clips.filter(c=>!c.overlay && c.status!=='played').sort((a,b)=>a.start-b.start);
    if(planned.length){ L.push(''); L.push('## Didn’t get to'); planned.forEach(c=>{ const a=ASSETS[c.sourceId]||{}; L.push(`- ${c.label||a.title||c.sourceId}`); }); }
  }
  return L.join('\n');
}
function downloadMd(md, name){
  if(typeof window!=='undefined' && window.augurSaveText){ window.augurSaveText(md, name); return; }   // native Save dialog in the Tauri build
  const blob=new Blob([md],{type:'text/markdown'}); const url=URL.createObjectURL(blob);
  const an=document.createElement('a'); an.href=url; an.download=name; document.body.appendChild(an); an.click(); an.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

/* ---------- undo / redo / persistence ---------- */
let undoStack=[], redoStack=[], storageOK=true;
function serialize(){
  return { clips:clips.map(c=>({...c})), lanes:LANES, playhead, tlHeight:curTlHeight(),
    selected:[...selected], dynamicAssets:JSON.parse(JSON.stringify(dynamicAssets)),
    fires:JSON.parse(JSON.stringify(fires)), vaultLoaded, target:TARGET_MIN,
    vaultFiles: (vaultLoaded && VAULT) ? serializeVault(VAULT).filter(f=>f.isText).map(f=>({path:f.path,text:f.text})) : null,
    counters:{clipSeq,groupSeq,stubSeq,fireSeq} };
}
function applyState(s){
  clips=s.clips.map(c=>({...c}));
  LANES=s.lanes; playhead=s.playhead;
  selected=new Set(s.selected||[]);
  vaultLoaded=!!s.vaultLoaded;
  if(typeof s.target==='number') TARGET_MIN=s.target;
  dynamicAssets=JSON.parse(JSON.stringify(s.dynamicAssets||{}));
  if(vaultLoaded){ for(const k in ASSETS) delete ASSETS[k]; }   // a saved vault replaces the seed
  Object.assign(ASSETS, dynamicAssets);
  fires=JSON.parse(JSON.stringify(s.fires||[]));
  pendingFire=null;
  if(s.counters){ clipSeq=s.counters.clipSeq; groupSeq=s.counters.groupSeq; stubSeq=s.counters.stubSeq; fireSeq=s.counters.fireSeq||1; }
  VAULT = (vaultLoaded && s.vaultFiles) ? buildVault(s.vaultFiles.map(f=>({path:f.path,name:f.path.split('/').pop(),text:f.text,isText:true}))) : null;
  if(VAULT) redriveFromVault();   // ASSETS derive from the editable vault
  document.documentElement.style.setProperty('--tl-h',(s.tlHeight||360)+'px');
}
function pushHistory(){ undoStack.push(serialize()); if(undoStack.length>80) undoStack.shift(); redoStack=[]; }
function undo(){ if(!undoStack.length) return; redoStack.push(serialize()); applyState(undoStack.pop()); commit(); }
function redo(){ if(!redoStack.length) return; undoStack.push(serialize()); applyState(redoStack.pop()); commit(); }
function checkStorage(){ try{ localStorage.setItem('__t','1'); localStorage.removeItem('__t'); storageOK=true; }catch(e){ storageOK=false; } }
let saveTimer=null;
function save(){
  if(!storageOK){ $('saveNote').textContent='session-only'; return; }
  try{ localStorage.setItem(KEY, JSON.stringify(serialize()));
    $('saveNote').textContent='saved ✓';
    clearTimeout(saveTimer); saveTimer=setTimeout(()=>{ $('saveNote').textContent=''; },1200);
  }catch(e){ storageOK=false; $('saveNote').textContent='session-only'; }
}
function load(){ try{ const raw=localStorage.getItem(KEY); if(!raw) return false; applyState(JSON.parse(raw)); return true; }catch(e){ return false; } }

/* central commit: re-render everything and persist */
function commit(){ renderBag(); renderTimeline(); renderMonitor(); updateButtons(); save(); }
